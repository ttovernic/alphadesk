function fetchOptions3D(){
  ["BTC","ETH","SOL"].forEach(function(sym){
    fetch("https://www.deribit.com/api/v2/public/get_book_summary_by_currency?currency="+sym+"&kind=option")
      .then(function(r){return r.json();})
      .then(function(d){
        if(!d||!d.result)return;
        var items=d.result;
        var calls=items.filter(function(i){return i.instrument_name&&i.instrument_name.slice(-1)==="C";});
        var puts=items.filter(function(i){return i.instrument_name&&i.instrument_name.slice(-1)==="P";});
        var tcOI=calls.reduce(function(s,i){return s+(i.open_interest||0);},0);
        var tpOI=puts.reduce(function(s,i){return s+(i.open_interest||0);},0);
        var pcr=tcOI>0?+(tpOI/tcOI).toFixed(2):null;
        // Max pain estimation
        var strikes={};
        items.forEach(function(i){
          var p=i.instrument_name.split("-");
          var strike=parseFloat(p[2]);if(!strike)return;
          if(!strikes[strike])strikes[strike]={c:0,p:0};
          if(i.instrument_name.slice(-1)==="C")strikes[strike].c+=i.open_interest||0;
          else strikes[strike].p+=i.open_interest||0;
        });
        var sp=Object.keys(strikes).map(parseFloat).sort(function(a,b){return a-b;});
        var minPain=null,maxPainStrike=null;
        sp.forEach(function(s2){
          var pain=0;
          sp.forEach(function(s3){
            if(s3<s2)pain+=strikes[s3].c*(s2-s3);
            if(s3>s2)pain+=strikes[s3].p*(s3-s2);
          });
          if(minPain===null||pain<minPain){minPain=pain;maxPainStrike=s2;}
        });
        // ── 25-DELTA SKEW (institucijski signal) ──────────────────
        // Skew = avg IV OTM puta (~85-95% strike) - avg IV OTM calla (~105-115% strike)
        // Negativan skew = tržište plaća više za zaštitu od pada = strah
        // Jako negativan (<-10%) = Extreme Fear u opcijama = kontrarian BUY
        var spot=items[0]&&items[0].underlying_price?items[0].underlying_price:0;
        var skew25d=null;
        if(spot>0){
          // Filtriraj front-month opcije (najlikvidniji expiry)
          var expiries={};
          items.forEach(function(i){
            var p=i.instrument_name.split("-");if(p.length<4)return;
            var exp=p[1];
            if(!expiries[exp])expiries[exp]=0;
            expiries[exp]+=(i.open_interest||0);
          });
          var frontExp=Object.keys(expiries).sort(function(a,b){return expiries[b]-expiries[a];})[0];
          if(frontExp){
            var frontOpts=items.filter(function(i){return i.instrument_name.indexOf(frontExp)>-1&&i.mark_iv>0;});
            // OTM puti: strike između 80-97% spot-a (aproksimacija 25-delta puta)
            var otmPuts=frontOpts.filter(function(i){
              var s=parseFloat(i.instrument_name.split("-")[2]);
              return i.instrument_name.slice(-1)==="P"&&s>=spot*0.80&&s<=spot*0.97;
            });
            // OTM callovi: strike između 103-120% spot-a (aproksimacija 25-delta calla)
            var otmCalls=frontOpts.filter(function(i){
              var s=parseFloat(i.instrument_name.split("-")[2]);
              return i.instrument_name.slice(-1)==="C"&&s>=spot*1.03&&s<=spot*1.20;
            });
            if(otmPuts.length>0&&otmCalls.length>0){
              var avgPutIV=otmPuts.reduce(function(s,i){return s+i.mark_iv;},0)/otmPuts.length;
              var avgCallIV=otmCalls.reduce(function(s,i){return s+i.mark_iv;},0)/otmCalls.length;
              skew25d=+(avgPutIV-avgCallIV).toFixed(2); // negativan = put skew = strah
            }
          }
        }
        optionsData[sym]={maxPain:maxPainStrike,putCallRatio:pcr,skew25d:skew25d,ts:Date.now()};
      }).catch(function(){
        var fb={BTC:{maxPain:75000,putCallRatio:0.72,skew25d:-8},ETH:{maxPain:2200,putCallRatio:0.85,skew25d:-5},SOL:{maxPain:100,putCallRatio:1.20,skew25d:-3}};
        if(fb[sym])optionsData[sym]=Object.assign({},fb[sym],{ts:Date.now()});
      });
  });
}

function fetchVP3D(){
  var allS=TOP100.concat(MEME_SYMS.filter(function(s){return TOP100.indexOf(s)<0;}));
  allS.forEach(function(sym,idx){
    // Batchiranje: 5 tokena svake 500ms da ne bombardiramo API
    setTimeout(function(){
    fetch("https://api.binance.com/api/v3/klines?symbol="+sym+"USDT&interval=1h&limit=200")
      .then(function(r){return r.json();})
      .then(function(data){
        if(!data||!data.length)return;
        var profile={},totalVol=0;
        var vols=[];
        // Izvuci close cijene za TA — KLJUČNA ISPRAVKA:
        // RSI/MACD/ATR se sada računaju iz 1h klines, ne iz WS tick-ova
        var closes=data.map(function(k){return parseFloat(k[4]);});
        data.forEach(function(k){
          var mid=((parseFloat(k[2])+parseFloat(k[3]))/2);
          var bucket=parseFloat(mid.toPrecision(3));
          var vol=parseFloat(k[5]);
          vols.push(vol);
          if(!profile[bucket])profile[bucket]=0;
          profile[bucket]+=vol;totalVol+=vol;
        });
        // TA iz 1h klines closes — standardni vremenski okvir za kratkoročne predikcije
        // hist se NE prepisuje — ostaje za sparkline (WS ticks)
        if(closes.length>=50){ta[sym]=compTA(closes);}
        if(closes.length>=27){macd[sym]=compMACD(closes);}
        if(closes.length>=15){atr[sym]=compATR(closes);}
        // Ažuriraj i sparkline s klines podacima ako WS još nije aktivan
        if(!hist[sym]||hist[sym].length<5){hist[sym]=closes.slice(-50);}
        // VWAP (zadnjih 24h = zadnje 24 svjećice, tipični trader VWAP)
        // VWAP = Σ(typical_price × volume) / Σ(volume)
        var vwapSlice=data.slice(-24);
        var cumPV=0,cumV=0;
        vwapSlice.forEach(function(k){
          var tp=(parseFloat(k[2])+parseFloat(k[3])+parseFloat(k[4]))/3; // typical price
          var vol=parseFloat(k[5]);
          cumPV+=tp*vol;cumV+=vol;
        });
        if(cumV>0){
          var vwap=cumPV/cumV;
          var lastClose=closes[closes.length-1];
          var distPct=+((lastClose-vwap)/vwap*100).toFixed(2);
          vwapData[sym]={vwap:vwap,distPct:distPct,bullish:lastClose>vwap,ts:Date.now()};
        }

        // Volume spike: usporedi zadnjih 24 svjećica (24h) s prosjekom prethodnih
        var recent24=vols.slice(-24).reduce(function(s,v){return s+v;},0);
        var prev24=vols.slice(-48,-24).reduce(function(s,v){return s+v;},0)||1;
        var spikeRatio=+(recent24/prev24).toFixed(2);
        volSpike[sym]={ratio:spikeRatio,bullish:spikeRatio>1.4,weak:spikeRatio<0.6};

        var poc=null,pocVol=0;
        Object.keys(profile).forEach(function(p2){
          if(profile[p2]>pocVol){pocVol=profile[p2];poc=parseFloat(p2);}
        });
        var sorted=Object.keys(profile).map(parseFloat).sort(function(a,b){return a-b;});
        var target=totalVol*0.70,accum=pocVol,vaH=poc,vaL=poc;
        var hi=sorted.indexOf(poc)+1,lo=sorted.indexOf(poc)-1;
        while(accum<target&&(hi<sorted.length||lo>=0)){
          var aH=hi<sorted.length?profile[sorted[hi]]||0:0;
          var aL=lo>=0?profile[sorted[lo]]||0:0;
          if(aH>=aL&&hi<sorted.length){accum+=aH;vaH=sorted[hi];hi++;}
          else if(lo>=0){accum+=aL;vaL=sorted[lo];lo--;}else break;
        }
        volProfile[sym]={poc:poc,valueAreaHigh:vaH,valueAreaLow:vaL,ts:Date.now()};
      }).catch(function(){});
    },Math.floor(idx/5)*500); // batch: 5 tokena / 500ms
  });
}

// ── FUTURES INSTITUCIONALNI SIGNALI ─────────────────────────────
// Basis, Long/Short ratio, Taker ratio — što koriste BlackRock, Bernstein i sl.
function fetchFuturesSignals(){
  var fSyms=["BTC","ETH","XRP","SOL","BNB","ADA","LINK","AVAX","DOGE"];
  fSyms.forEach(function(sym,idx){
    setTimeout(function(){
      var pair=sym+"USDT";

      // 1. FUTURES BASIS — spot vs perp razlika
      // Negativan basis (backwardation) = strah = kontrarian bullish
      // Visok pozitivan basis = greed = oprez
      fetch("https://fapi.binance.com/fapi/v1/premiumIndex?symbol="+pair)
        .then(function(r){return r.json();})
        .then(function(d){
          if(!d||!d.markPrice||!d.indexPrice)return;
          var mark=parseFloat(d.markPrice),index=parseFloat(d.indexPrice);
          var basis=+((mark-index)/index*100).toFixed(3); // % razlika
          if(!futuresData[sym])futuresData[sym]={};
          futuresData[sym].basis=basis;
          futuresData[sym].basisTrend=basis<-0.05?"BACKWARDATION":basis>0.1?"CONTANGO_HIGH":basis>0.03?"CONTANGO":"FLAT";
        }).catch(function(){});

      // 2. LONG/SHORT RATIO — omjer long vs short pozicija
      // < 0.8 = previše shortova = kontrarian BUY (jako pouzdan signal)
      // > 2.5 = previše longova = oprez, squeeze moguć
      fetch("https://fapi.binance.com/futures/data/globalLongShortAccountRatio?symbol="+pair+"&period=1h&limit=2")
        .then(function(r){return r.json();})
        .then(function(d){
          if(!d||!d.length)return;
          var latest=d[d.length-1],prev=d[0];
          var ratio=parseFloat(latest.longShortRatio);
          var prevRatio=parseFloat(prev.longShortRatio);
          var trend=ratio>prevRatio?"RISING":"FALLING";
          if(!futuresData[sym])futuresData[sym]={};
          futuresData[sym].lsRatio=+ratio.toFixed(3);
          futuresData[sym].lsTrend=trend;
        }).catch(function(){});

      // 3. TAKER BUY/SELL RATIO — agresivni kupci vs prodavači
      // Taker ratio < 0.8 = agresivno prodavanje = panic = kontrarian bottom signal
      // Taker ratio > 1.3 = agresivna kupnja = momentum potvrda
      fetch("https://fapi.binance.com/futures/data/takerlongshortRatio?symbol="+pair+"&period=1h&limit=6")
        .then(function(r){return r.json();})
        .then(function(d){
          if(!d||!d.length)return;
          // Uzmi prosjek zadnjih 6h za stabilniji signal
          var avg=d.reduce(function(s,x){return s+parseFloat(x.buySellRatio);},0)/d.length;
          if(!futuresData[sym])futuresData[sym]={};
          futuresData[sym].takerRatio=+avg.toFixed(3);
        }).catch(function(){});

    },idx*400);
  });
}

function fetchOrderBooks(){
  var allS2=TOP100.concat(MEME_SYMS.filter(function(s){return TOP100.indexOf(s)<0;}));
  allS2.forEach(function(sym,idx){
    setTimeout(function(){
    fetch("https://api.binance.com/api/v3/depth?symbol="+sym+"USDT&limit=20")
      .then(function(r){return r.json();})
      .then(function(d){
        if(!d||!d.bids||!d.asks)return;
        var bidVol=d.bids.reduce(function(s,b){return s+parseFloat(b[0])*parseFloat(b[1]);},0);
        var askVol=d.asks.reduce(function(s,a){return s+parseFloat(a[0])*parseFloat(a[1]);},0);
        var ratio=askVol>0?+(bidVol/askVol).toFixed(2):1;
        orderBook[sym]={bidAskRatio:ratio,bullish:ratio>1.25,bearish:ratio<0.75};
      }).catch(function(){});
    },idx*200); // stagger: 200ms po tokenu
  });
}

// ── LOAD TOP 100 (CoinGecko → inicijalizira tokene + WS) ─────────
function loadTop100(){
  fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false&price_change_percentage=7d,30d")
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data||!data.length)return;
      var syms=[];
      data.forEach(function(coin){
        var sym=coin.symbol.toUpperCase();
        if(STABLES.has(sym)||WRAPPED.has(sym))return; // preskoči stablecoine i wrapped tokene
        // Inicijaliziraj CFG za nepoznate tokene
        getCfg(sym);
        CFG[sym].cn=coin.name;
        // Spremi CoinGecko podatke
        cgData[sym]={
          change7d:coin.price_change_percentage_7d_in_currency||null,
          change30d:coin.price_change_percentage_30d_in_currency||null,
          rank:coin.market_cap_rank,
          vol24h:coin.total_volume
        };
        // Seed cijena iz CG (WS će prepisati)
        if(!px[sym]||!px[sym].ws)px[sym]={p:coin.current_price||0,c24:coin.price_change_percentage_24h||0,ws:false};
        syms.push(sym);
      });
      if(syms.length<5)return; // sanity check
      TOP100=syms;
      TOP100_LOADED=true;
      // Poveži WS za sve tokene
      connectWSPool(TOP100.concat(MEME_SYMS.filter(function(s){return TOP100.indexOf(s)<0;})));
      // Dohvati volume profile i order book za sve tokene (batched)
      fetchVP3D();
      fetchOrderBooks();
      // Ažuriraj subtitle
      var sub=document.getElementById("hdsub");
      if(sub&&!wsLive)sub.textContent="Top "+TOP100.length+" tokena · čekam WS…";
      render();
    })
    .catch(function(){
      // Fallback — ostani sa SYMS
      if(!TOP100_LOADED){TOP100=SYMS.slice();TOP100_LOADED=true;}
    });
}

// ── WEBSOCKET (multi-connection pool za 100+ tokena) ─────────────
function onWsMsg(e){
  try{
    var d=JSON.parse(e.data);if(d.data)d=d.data;if(!d.s)return;
    var s=d.s.replace("USDT",""),p=parseFloat(d.c);if(isNaN(p)||p<=0)return;
    px[s]={p:p,c24:parseFloat(d.P),ws:true};
    // hist = samo za sparkline prikaz (WS ticks)
    // ta/macd/atr se NE računaju ovdje — dolaze iz 1h klines (fetchVP3D)
    // jer RSI/MACD iz sekundnih tick-ova nema smisla za 3-dnevne predikcije
    if(!hist[s])hist[s]=[];hist[s].push(p);if(hist[s].length>100)hist[s]=hist[s].slice(-100);
    var t=document.getElementById("hdsub");if(t)t.textContent="Live · "+new Date().toLocaleTimeString("hr-HR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  }catch(ex){}
}
function connectWSPool(syms){
  if(typeof WebSocket==="undefined")return;
  // Zatvori stare konekcije
  wsPool.forEach(function(w){try{w.close();}catch(e){}});
  wsPool=[];wsLive=false;updWs();
  // Dedupliciraj i podijeli u grupe od 50 (Binance limit preporuka)
  var unique=syms.filter(function(s,i,a){return a.indexOf(s)===i;});
  for(var ci=0;ci<unique.length;ci+=50){
    (function(chunk){
      var streams=chunk.map(function(s){return s.toLowerCase()+"usdt@ticker";}).join("/");
      try{
        var ws=new WebSocket("wss://stream.binance.com:9443/stream?streams="+streams);
        ws.onopen=function(){wsLive=true;updWs();};
        ws.onmessage=onWsMsg;
        ws.onclose=function(){
          wsPool=wsPool.filter(function(w2){return w2!==ws;});
          if(wsPool.length===0){
            wsLive=false;updWs();
            if(!wsReconnectTimer)wsReconnectTimer=setTimeout(function(){wsReconnectTimer=null;connectWSPool(TOP100.concat(MEME_SYMS));},10000);
          }
        };
        ws.onerror=function(){};
        wsPool.push(ws);
      }catch(e){}
    })(unique.slice(ci,ci+50));
  }
}
function connectWS(){connectWSPool(TOP100.concat(MEME_SYMS));}

// ── OPEN INTEREST (Binance Futures) ─────────────────────────────
// OI raste + cijena raste = zdrav trend (novi kapital ulazi)
// OI pada + cijena raste = short covering, ne pravi bullish (slabiji signal)
// OI raste + cijena pada = bearish (shorteri otvaraju pozicije)
function fetchOpenInterest(){
  var fSyms=["BTC","ETH","XRP","SOL","BNB","ADA","LINK","AVAX","DOGE"];
  fSyms.forEach(function(sym,idx){
    setTimeout(function(){
      // Trenutni OI
      fetch("https://fapi.binance.com/fapi/v1/openInterest?symbol="+sym+"USDT")
        .then(function(r){return r.json();})
        .then(function(cur){
          if(!cur||!cur.openInterest)return;
          var curOI=parseFloat(cur.openInterest);
          // Povijesni OI (zadnjih 24h, 1h interval)
          fetch("https://fapi.binance.com/futures/data/openInterestHist?symbol="+sym+"USDT&period=1h&limit=25")
            .then(function(r2){return r2.json();})
            .then(function(hist2){
              if(!hist2||!hist2.length)return;
              var oldOI=parseFloat(hist2[0].sumOpenInterest)||curOI;
              var oiChg=+((curOI-oldOI)/oldOI*100).toFixed(2);
              var trend=oiChg>5?"RISING_FAST":oiChg>2?"RISING":oiChg<-5?"FALLING_FAST":oiChg<-2?"FALLING":"FLAT";
              openInterest[sym]={oiChange24h:oiChg,trend:trend,ts:Date.now()};
            }).catch(function(){});
        }).catch(function(){});
    },idx*300);
  });
}

// ── BACKGROUND AUTO-TRACK (neovisno o aktivnom tabu) ─────────────
function backgroundAutoTrack(){
  var syms=TOP100.filter(function(s){return px[s]&&px[s].p>0;});
  if(!syms.length)return;
  // Pokreni sve tri analyse funkcije paralelno i prikupi Ulaz + Watch signale
  [
    {fn:analyze3D,   pct:5},
    {fn:analyze3pct, pct:3},
    {fn:analyze10pct,pct:10}
  ].forEach(function(engine){
    var minConf=settings.minConf||40;
    var all=syms.map(engine.fn).filter(function(x){return x&&x.conf>=minConf;});
    // Postavi targetPct ako engine to nije stavio
    all.forEach(function(x){if(!x.targetPct)x.targetPct=engine.pct;});
    var ulaz=all.filter(function(x){return x.verdict&&x.verdict.indexOf("✅")===0;});
    var watch=all.filter(function(x){return x.verdict&&(x.verdict.indexOf("🟡")===0||x.verdict.indexOf("🔵")===0);});
    autoTrackOpps(ulaz,"ulaz");
    autoTrackOpps(watch,"watch");
  });
}
