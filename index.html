<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Alpha Desk · 3D Pogled</title>
<style>
:root{
  --bg:#000;--s1:#0c0c10;--s2:#141418;--s3:#1c1c22;--s4:#242430;
  --sep:rgba(255,255,255,.06);--sep2:rgba(255,255,255,.04);
  --t1:#fff;--t2:rgba(255,255,255,.75);--t3:rgba(255,255,255,.4);--t4:rgba(255,255,255,.18);
  --gr:#00e676;--re:#ff1744;--ye:#ffea00;--bl:#2979ff;--or:#ff6d00;--pu:#d500f9;
  --target-green:rgba(0,230,118,.12);--stop-red:rgba(255,23,68,.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#000;color:#fff;font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100dvh}

/* HEADER */
.hd{padding:12px 18px 8px;flex-shrink:0;background:rgba(0,0,0,.9);backdrop-filter:blur(40px);border-bottom:.5px solid var(--sep2);display:flex;align-items:center;gap:10px}
.hd-logo{flex:1}
.hd-title{font-size:15px;font-weight:800;letter-spacing:-.5px;color:#fff}
.hd-title span{color:var(--ye)}
.hd-sub{font-size:10px;color:var(--t3);margin-top:1px;letter-spacing:.02em}
.hd-claude{font-size:10px;color:rgba(0,230,118,.6);margin-top:2px;letter-spacing:.02em;display:none}
.live-pill{display:flex;align-items:center;gap:5px;background:rgba(0,230,118,.08);border:.5px solid rgba(0,230,118,.2);border-radius:20px;padding:5px 10px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--s4)}
.live-dot.on{background:var(--gr);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-txt{font-size:10px;font-weight:700;color:var(--gr);letter-spacing:.05em}

/* SCROLL */
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.sc::-webkit-scrollbar{display:none}
.pg{padding:14px 16px 70px}

/* TABS */
.filter-wrap{padding:0;flex-shrink:0;background:rgba(0,0,0,.85);backdrop-filter:blur(20px);border-bottom:.5px solid var(--sep2);display:flex;flex-direction:column}
.filter-top{display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.tab-row{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1;min-width:0}
.tab-row::-webkit-scrollbar{display:none}
.pct-row{display:flex;justify-content:center;padding:6px 16px 8px;border-top:.5px solid var(--sep2)}
#pct-desktop{display:none}
@media(min-width:600px){.filter-wrap{flex-direction:row;align-items:center;padding:0 16px}.filter-top{flex:1;min-width:0}.pct-row{display:none}#pct-desktop{display:flex}}
.tab{padding:13px 16px;font-size:13px;font-weight:600;border:none;background:none;color:var(--t3);cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab.on{color:var(--t1);border-bottom-color:var(--ye)}
.hd-gear{background:none;border:.5px solid var(--sep);border-radius:10px;padding:5px 9px;font-size:15px;cursor:pointer;color:var(--t3);transition:all .2s;flex-shrink:0}
.hd-gear:hover{color:var(--t1);border-color:rgba(255,255,255,.2)}
.pct-toggle{display:flex;background:var(--s3);border-radius:20px;padding:2px;border:.5px solid var(--sep);flex-shrink:0}
.pct-btn{padding:5px 9px;border-radius:18px;font-size:11px;font-weight:800;border:none;background:none;color:var(--t3);cursor:pointer;font-family:inherit;transition:all .2s;letter-spacing:-.3px}
.pct-btn.on{background:var(--ye);color:#000}

/* OPPORTUNITY CARD */
.opp{background:var(--s1);border-radius:20px;margin-bottom:12px;overflow:hidden;border:.5px solid var(--sep);transition:border-color .2s}
.opp.hot{border-color:rgba(255,109,0,.3)}
.opp.safe{border-color:rgba(0,230,118,.25)}
.opp.t60{border-color:rgba(41,121,255,.45)}
.opp.t70{border-color:rgba(255,234,0,.45)}
.opp.t80{border-color:rgba(255,109,0,.5)}
.opp.t90{border-color:rgba(255,215,0,.65);box-shadow:0 0 16px rgba(255,215,0,.09)}

/* HEADER STRIP */
.opp-head{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:.5px solid var(--sep2)}
.tok-ico{width:42px;height:42px;border-radius:13px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.opp-meta{flex:1}
.opp-name{font-size:18px;font-weight:800;letter-spacing:-.5px}
.opp-price{font-size:13px;color:var(--t3);margin-top:2px}
.conf-badge{text-align:right;flex-shrink:0}
.conf-num{font-size:28px;font-weight:900;letter-spacing:-2px;line-height:1}
.conf-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;opacity:.7}

/* CONFIDENCE RING */
.conf-ring{position:relative;width:56px;height:56px;flex-shrink:0}
.conf-ring svg{transform:rotate(-90deg)}
.conf-ring .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900}

/* VERDICT */
.verdict{padding:14px 16px;border-bottom:.5px solid var(--sep2)}
.verdict-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.verdict-text{font-size:14px;font-weight:600;color:var(--t1);line-height:1.5}
.verdict-why{font-size:12px;color:var(--t3);margin-top:4px;line-height:1.5}

/* TRADE SETUP */
.setup{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--sep2);border-bottom:.5px solid var(--sep2)}
.setup-cell{background:var(--s1);padding:12px 10px;text-align:center}
.setup-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;opacity:.5}
.setup-val{font-size:15px;font-weight:800;letter-spacing:-.3px}
.setup-sub{font-size:10px;margin-top:3px;opacity:.5}

/* TIMELINE */
.timeline{padding:14px 16px;border-bottom:.5px solid var(--sep2)}
.tl-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.tl-row{display:flex;gap:8px;margin-bottom:8px}
.tl-day{flex:1;border-radius:10px;padding:9px 10px;border:.5px solid var(--sep)}
.tl-day.d1{background:rgba(41,121,255,.06);border-color:rgba(41,121,255,.2)}
.tl-day.d2{background:rgba(255,234,0,.05);border-color:rgba(255,234,0,.15)}
.tl-day.d3{background:rgba(0,230,118,.05);border-color:rgba(0,230,118,.15)}
.tl-dname{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;opacity:.6}
.tl-dprice{font-size:13px;font-weight:700}
.tl-dprob{font-size:10px;opacity:.5;margin-top:2px}

/* SIGNALS */
.sigs{padding:12px 16px;display:flex;flex-wrap:wrap;gap:6px;border-bottom:.5px solid var(--sep2)}
.sig-chip{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--s3);color:var(--t2);border:.5px solid var(--sep)}
.sig-chip.bull{background:rgba(0,230,118,.08);color:var(--gr);border-color:rgba(0,230,118,.2)}
.sig-chip.bear{background:rgba(255,23,68,.07);color:var(--re);border-color:rgba(255,23,68,.15)}
.sig-chip.warn{background:rgba(255,234,0,.07);color:var(--ye);border-color:rgba(255,234,0,.18)}

/* RISK BAR */
.risk-bar{padding:12px 16px}
.risk-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:flex;justify-content:space-between}
.rbar{height:6px;background:var(--s4);border-radius:4px;overflow:hidden}
.rbar-fill{height:100%;border-radius:4px}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--t3)}

/* LEGEND */
.legend{background:var(--s1);border-radius:16px;padding:14px 16px;margin-bottom:14px;border:.5px solid var(--sep)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(30px);z-index:300;display:none;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:var(--s1);border-radius:26px 26px 0 0;width:100%;padding:20px 18px 44px;border-top:.5px solid rgba(255,255,255,.08);animation:up .28s cubic-bezier(.4,0,.2,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--s4);border-radius:2px;margin:0 auto 20px}
.inp{width:100%;background:var(--s2);border:.5px solid var(--sep);border-radius:12px;padding:13px 15px;font-size:15px;color:#fff;outline:none;-webkit-appearance:none;font-family:inherit}
.inp-lbl{font-size:12px;color:var(--t3);margin-bottom:6px;display:block;font-weight:500}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-p{padding:15px;background:var(--bl);border:none;border-radius:14px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;width:100%}
.btn-c{padding:15px;background:var(--s3);border:none;border-radius:14px;font-size:15px;font-weight:500;color:var(--t2);cursor:pointer;font-family:inherit;flex:1}

/* PROG */
.prog{height:3px;background:var(--s4);border-radius:3px;overflow:hidden}
.prog-f{height:100%;border-radius:3px}
svg.sp{overflow:visible;display:block}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <div class="hd-logo">
      <div class="hd-title">Alpha Desk <span>· 3D</span></div>
      <div class="hd-sub" id="hdsub">Učitavam top 100 tokena…</div>
      <div class="hd-claude" id="claude-update">🤖 Claude analiza: —</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="live-pill">
        <div class="live-dot" id="wsd"></div>
        <span class="live-txt" id="wst">WS</span>
      </div>
      <button class="hd-gear" onclick="openSettings()">⚙️</button>
    </div>
  </div>
  <div class="filter-wrap">
    <div class="filter-top">
      <div class="tab-row">
        <button class="tab on" id="tab-pregled" onclick="setTab('pregled')">Pregled</button>
        <button class="tab" id="tab-ulaz" onclick="setTab('ulaz')">Ulaz</button>
        <button class="tab" id="tab-watch" onclick="setTab('watch')">Watch</button>
        <button class="tab" id="tab-meme" onclick="setTab('meme')">🎰 Meme</button>
        <button class="tab" id="tab-rezultati" onclick="setTab('rezultati')">Rezultati</button>
      </div>
      <div class="pct-toggle" id="pct-desktop">
        <button class="pct-btn on" id="btn5d" onclick="setPct(5)">5%</button>
        <button class="pct-btn" id="btn3d" onclick="setPct(3)">3%</button>
        <button class="pct-btn" id="btn10d" onclick="setPct(10)">10%</button>
      </div>
    </div>
    <div class="pct-row">
      <div class="pct-toggle">
        <button class="pct-btn on" id="btn5" onclick="setPct(5)">5%</button>
        <button class="pct-btn" id="btn3" onclick="setPct(3)">3%</button>
        <button class="pct-btn" id="btn10" onclick="setPct(10)">10%</button>
      </div>
    </div>
  </div>
  <div class="sc" id="sc"></div>
</div>

<!-- Settings modal -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
<div class="modal">
  <div class="modal-handle"></div>
  <h2 style="font-size:19px;font-weight:800;margin-bottom:4px">Postavke skenera</h2>
  <p style="font-size:13px;color:var(--t3);margin-bottom:18px">Prilagodi parametre za 5% profit u 3 dana</p>
  <div class="g2" style="margin-bottom:12px">
    <div><label class="inp-lbl">Min pouzdanost (%)</label><input id="s-conf" class="inp" type="number" value="40" min="20" max="90"></div>
    <div><label class="inp-lbl">Target profit (%)</label><input id="s-tgt" class="inp" type="number" value="5" min="2" max="20" step="0.5"></div>
    <div><label class="inp-lbl">Max rizik (%)</label><input id="s-risk" class="inp" type="number" value="3" min="1" max="10" step="0.5"></div>
    <div><label class="inp-lbl">Min R/R omjer</label><input id="s-rr" class="inp" type="number" value="1.2" min="0.8" max="5" step="0.1"></div>
  </div>
  <div style="display:flex;gap:10px">
    <button class="btn-c" onclick="closeModal()">Odustani</button>
    <button class="btn-p" onclick="applySettings()">Primijeni</button>
  </div>
</div>
</div>

<script>
function lsSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}
function lsGet(k){try{return localStorage.getItem(k)}catch(e){return null}}

const SYMS=["BTC","ETH","XRP","BNB","ADA","LINK","SOL","AVAX","SUI"];
const MEME_SYMS=["DOGE","SHIB","PEPE","WIF","BONK","FLOKI"];
const CFG={
  BTC:{i:"₿",c:"#f7931a",cn:"Bitcoin"},ETH:{i:"Ξ",c:"#c77dff",cn:"Ethereum"},
  XRP:{i:"✕",c:"#00e676",cn:"XRP"},BNB:{i:"B",c:"#f0b90b",cn:"BNB"},
  ADA:{i:"A",c:"#0033ad",cn:"Cardano"},LINK:{i:"⬡",c:"#2979ff",cn:"Chainlink"},
  SOL:{i:"◎",c:"#9945ff",cn:"Solana"},AVAX:{i:"▲",c:"#ff1744",cn:"Avalanche"},
  SUI:{i:"◈",c:"#4fc3f7",cn:"Sui"},
  DOGE:{i:"Ð",c:"#c2a633",cn:"Dogecoin"},SHIB:{i:"🐕",c:"#ff6b35",cn:"Shiba Inu"},
  PEPE:{i:"🐸",c:"#00c853",cn:"Pepe"},WIF:{i:"🎩",c:"#9c27b0",cn:"dogwifhat"},
  BONK:{i:"🔨",c:"#ff9800",cn:"Bonk"},FLOKI:{i:"⚡",c:"#ffeb3b",cn:"Floki"}
};

// Settings
var settings={minConf:40,targetPct:5,maxRisk:3,minRR:1.2};
try{var ss=JSON.parse(lsGet("ad3d_s")||"{}");if(ss.minConf)settings=ss;}catch(e){}

// Macro context
var MACRO={
  warActive:true,macroPenalty:4,oil:115,
  fg:13,btcDom:57.9,stableDom:8.2,
  catalysts:{
    XRP:["Goldman $153.8M ETF","CLARITY Act 72% travanj","25% inst. planira XRP"],
    SOL:["25% inst. planira SOL","Alpenglow Q3","Mastercard SDP"],
    BTC:["Morgan Stanley $MSBT uskoro","Bernstein $150K","Halving dan 703/777"],
    ETH:["ETH $2K drži","Grok AI $4.9K-6.7K","ETH/BTC reversal potencijal"]
  },
  warnings:{
    XRP:["Iran range $1.30-$1.50","3.8B XRP na burzama"],
    SOL:["H&S formacija na grafovima","$80 break = put $60"],
    BTC:["Rudari troše $79,995/BTC","Dom >57% = altcoins pate"],
    ETH:["Fusaka tokenomic issue","ETF net outflows"]
  }
};

// Live data
var px={},hist={},ta={},macd={},atr={},fr={},wsLive=false;
SYMS.forEach(function(s){
  var base={BTC:68456,ETH:2123,XRP:1.36,BNB:618,ADA:0.246,LINK:8.74,SOL:83.18,AVAX:9.08,SUI:1.91};
  px[s]={p:base[s]||0,c24:0,ws:false};
});
MEME_SYMS.forEach(function(s){
  var base={DOGE:0.17,SHIB:0.0000140,PEPE:0.0000092,WIF:0.82,BONK:0.0000152,FLOKI:0.000091};
  px[s]={p:base[s]||0,c24:0,ws:false};
});

var activeFilter="all";
var activePct=5;
// Options + Volume Profile + Macro
var optionsData={};
var volProfile={};
// macroAssets drži live-fetched podatke (gold, BTC/Gold ratio)
// oil i dxyPressure su sada samo aliases na MACRO.oil (uklonjena duplikacija)
var macroAssets={gold:null,btcGoldRatio:null};
Object.defineProperty(macroAssets,'oil',{get:function(){return MACRO.oil||115;}});
Object.defineProperty(macroAssets,'dxyPressure',{get:function(){return (MACRO.oil||115)>110?"HIGH":(MACRO.oil||115)>90?"MEDIUM":"LOW";}});
var volSpike={};   // {sym:{ratio,bullish}}
var orderBook={};  // {sym:{bidAskRatio,bullish}}
var cgData={};     // {sym:{change7d,rank,vol24h}}
var dxyData={eurUsd:null,bullish:null};
var openInterest={}; // {sym:{oiChange24h,oiUsd,trend}} — iz Binance Futures
var ta4h={};  // {sym:{rsi,trend,ema50}} — 4h timeframe za trend potvrdu
var taDaily={}; // {sym:{rsi,trend}} — daily timeframe za macro trend
var vwapData={}; // {sym:{vwap,distPct,bullish}} — VWAP iz 1h klines
var futuresData={}; // {sym:{basis,lsRatio,takerRatio,skew25d}} — institucijski derivs signali
const CG_IDS={BTC:"bitcoin",ETH:"ethereum",XRP:"ripple",BNB:"binancecoin",ADA:"cardano",LINK:"chainlink",SOL:"solana",AVAX:"avalanche-2",SUI:"sui",DOGE:"dogecoin",SHIB:"shiba-inu",PEPE:"pepe",WIF:"dogwifhat",BONK:"bonk",FLOKI:"floki"};

// ── TOP 100 ENGINE ───────────────────────────────────────────────
const STABLES=new Set(["USDT","USDC","DAI","BUSD","TUSD","USDP","USDD","GUSD","FRAX","LUSD","PYUSD","USDS","FDUSD","USDE","EURS","EURT","USD0"]);
const WRAPPED=new Set(["WBTC","WSTETH","STETH","CBETH","RETH","WBETH","WEETH","WETH","WBNB","SOLVBTC","BBTC","HBTC"]);
var TOP100=SYMS.slice();     // dynamically populated from CoinGecko, starts with existing 9
var TOP100_LOADED=false;
var wsPool=[];               // pool of WS connections (chunks of 50)
var wsReconnectTimer=null;
function hslForSym(s){var h=0;for(var i=0;i<s.length;i++)h=(s.charCodeAt(i)+((h<<5)-h))|0;return'hsl('+(Math.abs(h)%360)+',65%,58%)';}
function getCfg(sym){if(!CFG[sym])CFG[sym]={i:sym.length<=3?sym:sym.slice(0,3),c:hslForSym(sym),cn:sym};return CFG[sym];}

// ── FORMAT ──────────────────────────────────────────────────────
function fp(n){if(!n||isNaN(n))return"—";if(n>=10000)return"$"+Math.round(n).toLocaleString("en");if(n>=100)return"$"+n.toFixed(2);if(n>=1)return"$"+n.toFixed(3);if(n>=0.01)return"$"+n.toFixed(5);return"$"+n.toFixed(8);}
function fc(n){return n==null?"—":(n>=0?"+":"")+n.toFixed(2)+"%";}
function gc(n){return n>=0?"var(--gr)":"var(--re)";}
function spk(data,col,w,h){w=w||52;h=h||16;if(!data||data.length<3)return"";var mn=Math.min.apply(null,data),mx=Math.max.apply(null,data),rng=mx-mn||1;var pts=data.map(function(v,i){return(i/(data.length-1)*w)+","+(h-((v-mn)/rng*(h-2))+1);}).join(" ");return'<svg class="sp" width="'+w+'" height="'+h+'"><polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';}
function pr(pct,col,h){return'<div class="prog"><div class="prog-f" style="width:'+Math.min(100,Math.max(0,pct||0))+'%;height:'+(h||3)+'px;background:'+col+'"></div></div>';}

// ── TECHNICAL ANALYSIS ───────────────────────────────────────────
function ema(d,p){var k=2/(p+1),e=d[0],r=[e];for(var i=1;i<d.length;i++){e=d[i]*k+e*(1-k);r.push(e);}return r;}
function compTA(c){
  if(!c||c.length<50)return null;
  // Wilder's smoothed RSI — stabilan, standardni izračun
  var gains=[],losses=[];
  for(var i=1;i<c.length;i++){var dd=c[i]-c[i-1];gains.push(dd>0?dd:0);losses.push(dd<0?-dd:0);}
  var avgG=gains.slice(0,14).reduce(function(a,b){return a+b;},0)/14;
  var avgL=losses.slice(0,14).reduce(function(a,b){return a+b;},0)/14;
  for(var j=14;j<gains.length;j++){avgG=(avgG*13+gains[j])/14;avgL=(avgL*13+losses[j])/14;}
  var rsi=avgL===0?100:100-100/(1+avgG/avgL);
  // Bollinger Bands (20-period SMA ± 2σ)
  var s20=c.slice(-20).reduce(function(a,b){return a+b;},0)/20;
  var sl20=c.slice(-20),std=Math.sqrt(sl20.reduce(function(a,b){return a+(b-s20)*(b-s20);},0)/20);
  // EMA50 trend filter — ključno za izbjegavanje false signala u downtendu
  var ema50arr=ema(c,50);var ema50=ema50arr[ema50arr.length-1];
  var price=c[c.length-1];
  var trend=price>ema50*1.01?"UP":price<ema50*0.99?"DOWN":"NEUTRAL";
  // RSI divergencija — jedan od najjačih reversal signala
  // Bullish: cijena pravi niži minimum, RSI pravi viši minimum = bullish reversal
  // Bearish: cijena pravi viši maksimum, RSI pravi niži maksimum = bearish reversal
  var divergence=null;
  if(c.length>=20){
    var recentC=c.slice(-10),prevC=c.slice(-20,-10);
    var recentLow=Math.min.apply(null,recentC),prevLow=Math.min.apply(null,prevC);
    var recentHigh=Math.max.apply(null,recentC),prevHigh=Math.max.apply(null,prevC);
    // Grubo aproksimiramo RSI za oba perioda koristeći Wilder na slice-ovima
    function rsiOf(arr){
      var g2=0,l2=0;
      for(var i=1;i<arr.length;i++){var dd2=arr[i]-arr[i-1];if(dd2>0)g2+=dd2;else l2+=-dd2;}
      var aG=g2/(arr.length-1),aL=l2/(arr.length-1);
      return aL===0?100:100-100/(1+aG/aL);
    }
    var rsiRecent=rsiOf(recentC),rsiPrev=rsiOf(prevC);
    if(recentLow<prevLow&&rsiRecent>rsiPrev&&rsiRecent<45){divergence="BULLISH";}
    else if(recentHigh>prevHigh&&rsiRecent<rsiPrev&&rsiRecent>55){divergence="BEARISH";}
  }
  return{rsi:rsi,s20:s20,bb:{u:s20+2*std,m:s20,l:s20-2*std},ema50:ema50,trend:trend,divergence:divergence};
}
function compMACD(c){
  if(!c||c.length<27)return null;
  var f=ema(c,12),sl=ema(c,26),ml=f.map(function(v,i){return v-sl[i];});
  // FIX: signal EMA se mora računati na PUNOM ml nizu, ne samo zadnjih 14
  // Inače je crossover kriva — EMA(9) iz 14 vrijednosti je nestabilna
  var sig=ema(ml,9);
  var hv=ml[ml.length-1]-sig[sig.length-1];
  var prev=(ml.length>=2&&sig.length>=2)?(ml[ml.length-2]-sig[sig.length-2]):0;
  return{hist:hv,cross:hv>0&&prev<=0?"BULLISH":hv<0&&prev>=0?"BEARISH":null,bullish:hv>0};
}
function compATR(c){
  if(!c||c.length<15)return null;
  var trs=[];for(var i=1;i<c.length;i++)trs.push(Math.abs(c[i]-c[i-1]));
  var av=trs.slice(-14).reduce(function(a,b){return a+b;},0)/14;
  return{atr:av,pct:+(av/c[c.length-1]*100).toFixed(2)};
}

// Određuje tržišnu fazu za kalibriraniju procjenu pouzdanosti
function getMarketRegime(){
  var fg=MACRO.fg,btcDom=MACRO.btcDom,stableDom=MACRO.stableDom;
  // Extreme Fear + kapital na sidelines + altcoin season = idealno za altove
  if(fg<20&&stableDom>7&&btcDom<50)return"ALT_ACCUMULATION";
  // Extreme Fear ali BTC dominira — kapital ide u BTC, ne altove
  if(fg<20&&btcDom>=55)return"BTC_DOMINANCE_FEAR";
  // Pohlepa + euforia = opasna zona
  if(fg>70)return"GREED_CAUTION";
  // Rat + visoka nafta = macro risk-off, minimizirati sve pozicije
  if(MACRO.warActive&&MACRO.oil>100)return"MACRO_RISK_OFF";
  return"NEUTRAL";
}

// ── ZAJEDNIČKI MARKET SIGNAL SCORER ─────────────────────────────
function scoreMarketSignals(sym,signals,warnings){
  var delta=0;
  // 1. BTC dominance penalizacija za altcoine — ključni filter koji nedostajao
  if(sym!=="BTC"&&sym!=="WBTC"){
    if(MACRO.btcDom>60){delta-=2;warnings.push({txt:"BTC dom "+MACRO.btcDom+"% — kapital u BTC, altovi pate",type:"bear"});}
    else if(MACRO.btcDom>55){delta-=1;warnings.push({txt:"BTC dom "+MACRO.btcDom+"% — alt season nije aktivan",type:"warn"});}
    else if(MACRO.btcDom<45){delta+=wt("btcDomLow",1);signals.push({txt:"BTC dom "+MACRO.btcDom+"% — alt season potencijal",type:"bull"});}
  }
  // 2. BTC trend penalizacija — ako je BTC u downtendu, alt longi su riskantni
  var btcTA=ta["BTC"];
  if(btcTA&&sym!=="BTC"){
    if(btcTA.rsi<38&&btcTA.trend==="DOWN"){delta-=1.5;warnings.push({txt:"BTC bearish (RSI "+btcTA.rsi.toFixed(0)+", ispod EMA50) — alt longi riskantni",type:"bear"});}
    else if(btcTA.rsi>58&&btcTA.trend==="UP"){delta+=wt("trendUp",0.5);signals.push({txt:"BTC bullish trend — pozitivan za altove",type:"bull"});}
  }
  // 2b. Multi-timeframe alignment — najjači filter za lažne signale
  var t4h=ta4h[sym],tDay=taDaily[sym];
  if(t4h&&tDay){
    // Sva 3 timeframea poravnata = jak signal
    var t1h=ta[sym];
    var bullCount=(t1h&&t1h.trend==="UP"?1:0)+(t4h.trend==="UP"?1:0)+(tDay.trend==="UP"?1:0);
    var bearCount=(t1h&&t1h.trend==="DOWN"?1:0)+(t4h.trend==="DOWN"?1:0)+(tDay.trend==="DOWN"?1:0);
    if(bullCount===3){delta+=wt("mtfAllUp",2);signals.push({txt:"MTF: 1h+4h+Daily svi UP — jak alignment",type:"bull"});}
    else if(bullCount===2&&bearCount===0){delta+=1;signals.push({txt:"MTF: 2/3 timeframea bullish",type:"bull"});}
    else if(bearCount===3){delta-=3;warnings.push({txt:"MTF: 1h+4h+Daily svi DOWN — jak bearish alignment",type:"bear"});}
    else if(bearCount===2){delta-=1.5;warnings.push({txt:"MTF: 2/3 timeframea bearish",type:"warn"});}
    // RSI agregatna provjera — je li oversold na višim TF?
    if(t4h.rsi<35&&tDay.rsi<40){delta+=1.5;signals.push({txt:"4h RSI "+t4h.rsi.toFixed(0)+", Daily RSI "+tDay.rsi.toFixed(0)+" — multi-TF oversold",type:"bull"});}
    else if(t4h.rsi>68&&tDay.rsi>65){delta-=1.5;warnings.push({txt:"4h+Daily overbought — izlazni signal",type:"bear"});}
  } else if(t4h){
    // Samo 4h dostupan
    if(t4h.trend==="DOWN"&&t4h.rsi>55){delta-=1;warnings.push({txt:"4h downtrend — 1h signali manje pouzdani",type:"warn"});}
    else if(t4h.trend==="UP"){delta+=0.5;signals.push({txt:"4h uptrend — potvrda smjera",type:"bull"});}
  }
  // 3. Volume Spike (iz Binance klines)
  var vs=volSpike[sym];
  if(vs){
    if(vs.ratio>2.0){delta+=wt("volSpike",2);signals.push({txt:"Volume spike "+vs.ratio.toFixed(1)+"x avg — jak interes",type:"bull"});}
    else if(vs.ratio>1.4){delta+=wt("volSpike",1);signals.push({txt:"Volume "+vs.ratio.toFixed(1)+"x avg — interes raste",type:"bull"});}
    else if(vs.weak){delta-=1;warnings.push({txt:"Volume slab "+vs.ratio.toFixed(1)+"x — nema interesa",type:"warn"});}
  }
  // 4. Order Book Imbalance (Binance depth)
  var ob=orderBook[sym];
  if(ob){
    if(ob.bidAskRatio>1.5){delta+=2;signals.push({txt:"Order book "+ob.bidAskRatio+"x bids — jak buying pressure",type:"bull"});}
    else if(ob.bullish){delta+=1;signals.push({txt:"Order book: bids > asks ("+ob.bidAskRatio+"x)",type:"bull"});}
    else if(ob.bearish){delta-=1.5;warnings.push({txt:"Order book: asks dominiraju ("+ob.bidAskRatio+"x)",type:"bear"});}
  }
  // 5. CoinGecko 7d i 30d trend
  var cg=cgData[sym];
  if(cg&&cg.change7d!=null){
    if(cg.change7d<-25){delta+=1.5;signals.push({txt:"7d: "+cg.change7d.toFixed(0)+"% — jako oversold dugoročno",type:"bull"});}
    else if(cg.change7d<-10){delta+=0.5;signals.push({txt:"7d: "+cg.change7d.toFixed(0)+"% — trend oversold",type:"bull"});}
    else if(cg.change7d>30){delta-=1;warnings.push({txt:"7d: +"+cg.change7d.toFixed(0)+"% — možda overbought",type:"warn"});}
  }
  if(cg&&cg.change30d!=null){
    if(cg.change30d<-40){delta+=1;signals.push({txt:"30d: "+cg.change30d.toFixed(0)+"% — ekstremni dugoročni pad",type:"bull"});}
    else if(cg.change30d>50){delta-=0.5;warnings.push({txt:"30d: +"+cg.change30d.toFixed(0)+"% — dugoročno overbought",type:"warn"});}
  }
  // 6. DXY proxy (EUR/USD — frankfurter.app)
  if(dxyData.eurUsd!=null){
    if(dxyData.bullish){delta+=1;signals.push({txt:"EUR/USD "+dxyData.eurUsd+" — slabiji USD, bullish crypto",type:"bull"});}
    else{delta-=0.5;warnings.push({txt:"Jak USD (EUR/USD "+dxyData.eurUsd+") — pritisak na crypto",type:"warn"});}
  }
  // 7. VWAP signal — ispod VWAP = potencijal za mean reversion gore
  var vw=vwapData[sym];
  if(vw){
    if(vw.distPct<-3){delta+=1.5;signals.push({txt:"Ispod VWAP "+Math.abs(vw.distPct).toFixed(1)+"% — mean reversion zona",type:"bull"});}
    else if(vw.distPct<-1){delta+=0.5;signals.push({txt:"Blago ispod VWAP — kupci na vidiku",type:"bull"});}
    else if(vw.distPct>5){delta-=1;warnings.push({txt:"Iznad VWAP +"+vw.distPct.toFixed(1)+"% — skupo, oprez",type:"warn"});}
    else if(vw.bullish){delta+=0.5;}
  }
  // 8. FUTURES BASIS — negativan = strah = kontrarian bullish (BlackRock koristi)
  var fd=futuresData[sym];
  if(fd&&fd.basis!=null){
    if(fd.basisTrend==="BACKWARDATION"){delta+=wt("basisBack",2.5);signals.push({txt:"Basis "+fd.basis+"% — backwardation = strah = kontrarian BUY",type:"bull"});}
    else if(fd.basis>0&&fd.basis<0.03){delta+=0.5;signals.push({txt:"Basis neutralan "+fd.basis+"%",type:"bull"});}
    else if(fd.basisTrend==="CONTANGO_HIGH"){delta-=1.5;warnings.push({txt:"Basis +"+fd.basis+"% — visok contango = longs preplati, oprez",type:"warn"});}
  }
  // 9. LONG/SHORT RATIO — institucionalni kontrarian signal
  if(fd&&fd.lsRatio!=null){
    if(fd.lsRatio<0.7){delta+=wt("lsRatioExtreme",3);signals.push({txt:"L/S ratio "+fd.lsRatio+" — ekstremni shorts = kontrarian BUY",type:"bull"});}
    else if(fd.lsRatio<0.85){delta+=wt("lsRatioBull",1.5);signals.push({txt:"L/S ratio "+fd.lsRatio+" — previše shortova = buy signal",type:"bull"});}
    else if(fd.lsRatio>2.5){delta-=2;warnings.push({txt:"L/S ratio "+fd.lsRatio+" — ekstremni longs = squeeze rizik",type:"bear"});}
    else if(fd.lsRatio>1.8){delta-=1;warnings.push({txt:"L/S ratio "+fd.lsRatio+" — više longova, oprez",type:"warn"});}
  }
  // 10. TAKER BUY/SELL RATIO — agresivnost kupaca vs prodavača
  if(fd&&fd.takerRatio!=null){
    if(fd.takerRatio<0.75){delta+=wt("takerSell",2);signals.push({txt:"Taker ratio "+fd.takerRatio+" — agresivno prodavanje = panic bottom",type:"bull"});}
    else if(fd.takerRatio<0.88){delta+=wt("takerSell",1);signals.push({txt:"Taker ratio "+fd.takerRatio+" — prodavači dominiraju = potencijalni bottom",type:"bull"});}
    else if(fd.takerRatio>1.4){delta+=1;signals.push({txt:"Taker ratio "+fd.takerRatio+" — agresivna kupnja = momentum",type:"bull"});}
    else if(fd.takerRatio>1.6){delta-=0.5;warnings.push({txt:"Taker ratio "+fd.takerRatio+" — euforična kupnja, pazi na reversal",type:"warn"});}
  }
  // 11. Open Interest (Binance Futures) — potvrđuje ili negira trend
  var oi=openInterest[sym];
  if(oi){
    var p2=px[sym];var priceUp=p2&&p2.c24>1;var priceDown=p2&&p2.c24<-1;
    if(oi.trend==="RISING_FAST"&&priceUp){delta+=2;signals.push({txt:"OI +"+oi.oiChange24h+"% + cijena raste — novi kapital, jak trend",type:"bull"});}
    else if(oi.trend==="RISING"&&priceUp){delta+=1;signals.push({txt:"OI raste +"+oi.oiChange24h+"% — trend potvrđen",type:"bull"});}
    else if(oi.trend==="RISING_FAST"&&priceDown){delta-=2;warnings.push({txt:"OI +"+oi.oiChange24h+"% + cijena pada — shorteri otvaraju, bearish",type:"bear"});}
    else if(oi.trend==="FALLING_FAST"&&priceUp){delta-=1;warnings.push({txt:"OI -"+Math.abs(oi.oiChange24h)+"% — rast od short coveringa, nije pravi bullish",type:"warn"});}
    else if(oi.trend==="FALLING"&&priceDown){delta+=1;signals.push({txt:"OI pada uz cijenu — pozicije se zatvaraju, dno blizu",type:"bull"});}
  }
  return delta;
}

// ── CORE 3-DAY ANALYSIS ENGINE ───────────────────────────────────
function analyze3D(sym){
  var d=px[sym]||{},t=ta[sym],m=macd[sym],a=atr[sym],f=fr[sym];
  var price=d.p||0;
  if(!price)return null;

  var score=0,signals=[],warnings=[];
  var regime=getMarketRegime();

  // F&G Extreme Fear — JEDNOM (uklonjeno duplo brojanje)
  if(MACRO.fg<20){score+=wt("fgExtremeFear",2);signals.push({txt:"F&G "+MACRO.fg+" — Extreme Fear = kontrarian BUY signal",type:"bull"});}
  else if(MACRO.fg<35){score+=wt("fgFear",1);}
  else if(MACRO.fg>70){score-=1;warnings.push({txt:"F&G "+MACRO.fg+" — euforia = opasna zona",type:"warn"});}

  // Stablecoin dominance
  if(MACRO.stableDom>7){score+=1;signals.push({txt:"Stablecoin dom "+MACRO.stableDom+"% — likvidnost čeka",type:"bull"});}

  // RSI + EMA50 trend filter
  if(t){
    if(t.trend==="DOWN"){
      score-=2;warnings.push({txt:"Ispod EMA50 — bear trend aktivan, oversold signali nepouzdani",type:"bear"});
    } else if(t.trend==="UP"){
      score+=wt("trendUp",1.5);signals.push({txt:"Iznad EMA50 — trend potvrđen",type:"bull"});
    }
    if(t.rsi<32){score+=wt("rsiOversold",3);signals.push({txt:"RSI "+t.rsi.toFixed(0)+" — jako oversold",type:"bull"});}
    else if(t.rsi<42){score+=wt("rsiOversold",1.5);signals.push({txt:"RSI "+t.rsi.toFixed(0)+" — oversold",type:"bull"});}
    else if(t.rsi>72){score-=3;warnings.push({txt:"RSI "+t.rsi.toFixed(0)+" — overbought",type:"bear"});}
    // Bollinger
    if(t.bb&&price<t.bb.l){score+=wt("bbBelow",2);signals.push({txt:"Ispod Bollinger dna — mean reversion signal",type:"bull"});}
    else if(t.bb&&price>t.bb.u){score-=2;warnings.push({txt:"Iznad Bollinger vrha — opasna zona",type:"bear"});}
    // RSI divergencija
    if(t.divergence==="BULLISH"){score+=wt("divBullish",3);signals.push({txt:"Bullish RSI divergencija — cijena niže, RSI više = reversal",type:"bull"});}
    else if(t.divergence==="BEARISH"){score-=2.5;warnings.push({txt:"Bearish RSI divergencija — slabi momentum",type:"bear"});}
  } else {
    if(MACRO.fg<20)score+=1.5;
    signals.push({txt:"TA signali dostupni na Netlify (WS live)",type:"warn"});
  }

  // MACD short-term momentum
  if(m){
    if(m.cross==="BULLISH"){score+=wt("macdBullCross",3);signals.push({txt:"MACD bullish crossover — momentum se okreće",type:"bull"});}
    else if(m.cross==="BEARISH"){score-=2;warnings.push({txt:"MACD bearish — momentum negativan",type:"bear"});}
    else if(m.bullish){score+=1;signals.push({txt:"MACD pozitivan",type:"bull"});}
    else{score-=1;warnings.push({txt:"MACD negativan",type:"warn"});}
  }

  // Funding rate (kontrarian)
  if(f&&f.rate!=null){
    var fr2=f.rate*100;
    if(fr2<-0.03){score+=3;signals.push({txt:"FR "+fr2.toFixed(3)+"% — masivni shorts = kontrarian BUY",type:"bull"});}
    else if(fr2<-0.01){score+=1.5;signals.push({txt:"FR negativan — shortovi preplati",type:"bull"});}
    else if(fr2>0.03){score-=2;warnings.push({txt:"FR "+fr2.toFixed(3)+"% — longs preplati = opasnost",type:"bear"});}
    else if(fr2>0.01){score-=1;warnings.push({txt:"FR blago pozitivan — lagani rizik",type:"warn"});}
  }

  // 24h momentum — JEDNOM (uklonjeno duplo brojanje)
  if(d.c24!=null){
    if(d.c24<-5&&t&&t.rsi<40){score+=2;signals.push({txt:"Pad "+d.c24.toFixed(1)+"% + oversold = bounce setup",type:"bull"});}
    else if(d.c24<-4&&MACRO.fg<25){score+=1.5;signals.push({txt:"Pad "+d.c24.toFixed(1)+"% u Extreme Fear = oversold bounce",type:"bull"});}
    else if(d.c24>5){score+=1;signals.push({txt:"+"+d.c24.toFixed(1)+"% momentum",type:"bull"});}
    else if(d.c24<-8){score-=1;warnings.push({txt:d.c24.toFixed(1)+"% — jak pad, pazi na nastavak",type:"warn"});}
  }

  // Macro war + oil penalty
  if(MACRO.warActive){score-=1.5;warnings.push({txt:"Iran rat — smanjuje pouzdanost. Manji kapital.",type:"warn"});}
  if(MACRO.oil>110){score-=1.5;warnings.push({txt:"Nafta $"+MACRO.oil+" — inflacijski pritisak",type:"warn"});}
  else if(MACRO.oil<90){score+=1;signals.push({txt:"Nafta jeftina — inflacija smirena",type:"bull"});}

  // Market regime bonus/penalty
  // NAPOMENA: BTC_DOMINANCE_FEAR se NE penalizira ovdje — već je u scoreMarketSignals (btcDom check)
  // MACRO_RISK_OFF: samo informativni mali penalty — war i oil su već penalizirani posebno
  if(regime==="MACRO_RISK_OFF"){score-=0.5;warnings.push({txt:"Macro Risk-Off — konzervativni pristup",type:"warn"});}
  if(regime==="ALT_ACCUMULATION"&&sym!=="BTC"){score+=0.5;signals.push({txt:"Alt Accumulation regime — povoljno",type:"bull"});}

  // Token-specific catalysts (zadržano, ali statični boost uklonjen)
  var cats=MACRO.catalysts[sym]||[];
  score+=cats.length*0.4;
  cats.slice(0,2).forEach(function(c2){signals.push({txt:c2,type:"bull"});});

  var warns2=MACRO.warnings[sym]||[];
  score-=warns2.length*0.3;
  warns2.slice(0,2).forEach(function(w){warnings.push({txt:w,type:"warn"});});

  // BTC/Gold makro korelacija
  if(macroAssets.btcGoldRatio&&macroAssets.btcGoldRatio<15&&sym!=="BTC"){
    score-=0.5;warnings.push({txt:"BTC/Gold ratio nizak — makro bearish",type:"warn"});}

  // OPTIONS MARKET SIGNAL
  var opt=optionsData[sym];
  if(opt&&opt.putCallRatio){
    if(opt.putCallRatio>1.3){score+=2;signals.push({txt:"Put/Call "+opt.putCallRatio+" — previše shorta = kontrarian BUY",type:"bull"});}
    else if(opt.putCallRatio>1.0){score+=1;signals.push({txt:"Put/Call "+opt.putCallRatio+" — blago bullish",type:"bull"});}
    else if(opt.putCallRatio<0.65){score-=1.5;warnings.push({txt:"Put/Call "+opt.putCallRatio+" — previše longa = oprez",type:"bear"});}
  }
  // 25-DELTA SKEW — najvažniji institucijski options signal
  // Negativan skew = puti skupi = tržište se štiti od pada = strah
  // Jako negativan (<-10%) = Extreme Fear u opcijama = kontrarian BUY
  if(opt&&opt.skew25d!=null){
    if(opt.skew25d<-15){score+=3;signals.push({txt:"25Δ Skew "+opt.skew25d.toFixed(1)+"% — Extreme put premium = jak kontrarian BUY",type:"bull"});}
    else if(opt.skew25d<-7){score+=2;signals.push({txt:"25Δ Skew "+opt.skew25d.toFixed(1)+"% — put skew = tržište štiti pad",type:"bull"});}
    else if(opt.skew25d<-3){score+=1;signals.push({txt:"25Δ Skew "+opt.skew25d.toFixed(1)+"% — blago negativan = oprezno",type:"bull"});}
    else if(opt.skew25d>5){score-=1.5;warnings.push({txt:"25Δ Skew +"+opt.skew25d.toFixed(1)+"% — call skew = euforia u opcijama",type:"bear"});}
    else if(opt.skew25d>10){score-=2.5;warnings.push({txt:"25Δ Skew +"+opt.skew25d.toFixed(1)+"% — jak call premium = vrh blizu",type:"bear"});}
  }
  if(opt&&opt.maxPain&&price){
    var mpDist=((opt.maxPain-price)/price*100);
    if(mpDist>5&&mpDist<25){score+=1;signals.push({txt:"Max Pain "+fp(opt.maxPain)+" (+"+mpDist.toFixed(0)+"%) — gravitacija gore",type:"bull"});}
    else if(mpDist<-5&&mpDist>-25){score-=1;warnings.push({txt:"Max Pain "+fp(opt.maxPain)+" ("+mpDist.toFixed(0)+"%) — gravitacija dolje",type:"warn"});}
  }

  // VOLUME PROFILE SIGNAL
  var vp=volProfile[sym];
  if(vp&&price){
    if(price<vp.valueAreaLow){score+=2;signals.push({txt:"Ispod Value Area ("+fp(vp.valueAreaLow)+") — mean reversion bullish",type:"bull"});}
    else if(price>vp.valueAreaHigh){score-=1;warnings.push({txt:"Iznad Value Area ("+fp(vp.valueAreaHigh)+") — skupo",type:"warn"});}
    else{score+=0.5;signals.push({txt:"Unutar VA, POC: "+fp(vp.poc),type:"bull"});}
  }

  // ATR — volatility determines if 5% is achievable in 3 days
  var atrPct=a?parseFloat(a.pct):2.0;
  var daily5pct=settings.targetPct/3;
  var achievable3d=atrPct>=daily5pct*0.8;

  // Tržišni signali: BTC dom, BTC trend, volume, order book, 7d trend, DXY
  score+=scoreMarketSignals(sym,signals,warnings);

  // Confidence calculation — rekalibrirani maxScore i strožiji war cap
  var maxScore=28;
  var rawConf=Math.round(50+(score/maxScore)*40);
  // War cap — dovoljno visok da se prikažu signali, ali konzervativniji od mirnog tržišta
  var warCap=score>=4?55:score>=2?50:44;
  var conf=Math.min(MACRO.warActive?warCap:88,Math.max(22,rawConf));
  // Historijska kalibracija — prilagodi prema stvarnoj točnosti
  var calCap=getConfCalibrationCap(5);
  if(calCap!==null)conf=Math.min(conf,calCap);
  // Token-specifična kalibracija (min 3 predikcije po tokenu)
  var tokAcc=getTokenAccuracy(sym,5);
  if(tokAcc!==null){
    var tokCap=Math.round((tokAcc*100+12)/5)*5;
    conf=Math.min(conf,Math.max(25,tokCap));
  }

  // Expected 3-day price targets
  var tgt=settings.targetPct/100;
  var risk=settings.maxRisk/100;
  var d1Price=+(price*(1+tgt*0.35)).toFixed(4); // day 1: 35% of target
  var d2Price=+(price*(1+tgt*0.70)).toFixed(4); // day 2: 70% of target
  var d3Price=+(price*(1+tgt)).toFixed(4);       // day 3: full target
  var stopPrice=+(price*(1-risk)).toFixed(4);

  var rr=(price*tgt)/(price*risk);

  // Probability estimate per day (bayesian-style)
  var baseProb=conf/100;
  var d1Prob=Math.round(baseProb*0.85*100);
  var d2Prob=Math.round(baseProb*0.72*100);
  var d3Prob=Math.round(baseProb*0.60*100);

  // Risk level
  var riskLevel=atrPct>4?"VISOK":atrPct>2?"UMJEREN":"NIZAK";
  var riskCol=atrPct>4?"var(--re)":atrPct>2?"var(--ye)":"var(--gr)";

  // Hot or safe classification — radi za sve tokene (ne samo hardkodirane)
  var isHot=conf>=60&&score>=2.5&&achievable3d;
  var isSafe=conf>=55&&riskLevel!=="VISOK"&&rr>=settings.minRR&&atrPct<=4;

  // Build verdict
  var verdict="";
  var verdictWhy="";
  if(conf>=58&&score>=2){
    verdict="✅ Ulazi — dobra prilika";
    verdictWhy="Višestruki bullish signali. "+( achievable3d?"ATR pokriva 5% potez u 3 dana.":"Volatilnost niska — potez može trajati dulje.")+" "+(MACRO.warActive?"Koristiti 50-70% normale pozicije zbog rata.":"");
  } else if(conf>=48&&score>=0){
    verdict="🟡 Ulaz s oprezom";
    verdictWhy="Setup je pozitivan. Čekaj potvrdu — zelena svjećica iznad "+fp(price*1.012)+" za entry. Stop-loss obavezan na "+fp(price*(1-settings.maxRisk/100))+".";
  } else if(conf>=38&&score>=-1){
    verdict="🔵 Spekulativni ulaz";
    verdictWhy="Slabiji signali ali Extreme Fear + institucije drže daje šansu za bounce. Koristiti max 30% normale pozicije.";
  } else {
    verdict="🔴 Preskoči";
    verdictWhy="Signali nisu dovoljno jaki. Pričekaj bolji setup.";
  }

  return{
    sym:sym,price:price,conf:conf,score:score,
    signals:signals,warnings:warnings,
    d1Price:d1Price,d2Price:d2Price,d3Price:d3Price,
    d1Prob:d1Prob,d2Prob:d2Prob,d3Prob:d3Prob,
    stopPrice:stopPrice,targetPrice:d3Price,
    rr:+rr.toFixed(1),riskLevel:riskLevel,riskCol:riskCol,
    atrPct:atrPct,achievable3d:achievable3d,
    isHot:isHot,isSafe:isSafe,
    verdict:verdict,verdictWhy:verdictWhy,
    cats:cats,warns:warns2,
    opt:opt||null,

  };
}

function getOpportunities(){

  var minConf=activeFilter==="watch"?Math.min(settings.minConf,38):settings.minConf;
  // Koristi sve tokene iz TOP100 koji imaju cijenu
  var syms=TOP100.filter(function(s){return px[s]&&px[s].p>0;});
  var all=syms.map(analyzeFn).filter(function(x){return x&&x.conf>=minConf;});
  all.sort(function(a,b){return b.conf-a.conf||b.score-a.score;});

  if(activeFilter==="ulaz"){var ulazRes=all.filter(function(x){return x.verdict&&x.verdict.indexOf("✅")===0;});autoTrackOpps(ulazRes,"ulaz");return ulazRes;}
  if(activeFilter==="watch"){var watchRes=all.filter(function(x){return x.verdict&&(x.verdict.indexOf("🟡")===0||x.verdict.indexOf("🔵")===0);});autoTrackOpps(watchRes,"watch");return watchRes;}
  if(activeFilter==="hot")return all.filter(function(x){return x.isHot;});
  return all;
}

// Izračun lift-based težina iz zatvorenih predikcija
function computeSignalWeights(){
  var closed=predTracker.filter(function(p){return p.status!=="AKTIVAN"&&p.snap;});
  if(closed.length<8)return null;
  var baseHits=closed.filter(function(p){return p.status==="POGODAK";}).length;
  var baseRate=baseHits/closed.length;
  if(baseRate===0||baseRate===1)return null;
  var FIELDS=["rsiOversold","rsiOverbought","trendUp","trendDown","bbBelow","divBullish",
    "divBearish","macdBullCross","macdBearCross","lsRatioBull","lsRatioExtreme",
    "basisBack","takerSell","btcDomHigh","btcDomLow","volSpike","mtfAllUp","fgExtremeFear","fgFear"];
  var weights={};
  FIELDS.forEach(function(f){
    var sub=closed.filter(function(p){return p.snap[f];});
    if(sub.length<3){weights[f]=1.0;return;}
    var hits=sub.filter(function(p){return p.status==="POGODAK";}).length;
    var rate=hits/sub.length;
    var lift=rate/baseRate;
    // Bayesian smooth prema 1.0 (prior snaga = 5 pseudo-uzoraka)
    var smoothed=(lift*sub.length+1.0*5)/(sub.length+5);
    weights[f]=+Math.max(0.3,Math.min(2.0,smoothed)).toFixed(3);
  });
  return weights;
}

  var w=computeSignalWeights();
  if(w){signalWeights=w;try{localStorage.setItem("ad3d_weights",JSON.stringify(w));}catch(e){}}

function statsForGroup(preds){
  var closed=preds.filter(function(p){return p.status!=="AKTIVAN";});
  var hits=closed.filter(function(p){return p.status==="POGODAK";});
  var misses=closed.filter(function(p){return p.status==="PROMAŠAJ";});
  var active=preds.filter(function(p){return p.status==="AKTIVAN";});
  var acc=closed.length>0?Math.round(hits.length/closed.length*100):null;
  var avgGain=hits.length>0?(hits.reduce(function(s,p){return s+(p.closePct||0);},0)/hits.length).toFixed(1):null;
  var avgLoss=misses.length>0?(misses.reduce(function(s,p){return s+(p.closePct||0);},0)/misses.length).toFixed(1):null;
  return{total:preds.length,active:active.length,hits:hits.length,misses:misses.length,acc:acc,avgGain:avgGain,avgLoss:avgLoss};
}

// ── HISTORIJSKA KALIBRACIJA CONFIDENCE SCORE-A ───────────────────
// Ako je prošla točnost X%, engine kalibrira buduće confidence score-ove
// Primjer: conf=70% ali točnost=45% → cap confidence na 52% (45+7 buffer)
// Filtrira po targetPct da kalibracija bude specifična za svaki target
function getConfCalibrationCap(tPct){
  var pct=tPct||settings.targetPct;
  var closed=predTracker.filter(function(p){return p.status!=="AKTIVAN"&&(p.targetPct||5)===pct;});
  // Fallback na sve ako nema dovoljno za ovaj target
  if(closed.length<10){
    var allClosed=predTracker.filter(function(p){return p.status!=="AKTIVAN";});
    if(allClosed.length<10)return null;
    closed=allClosed;
  }
  var hits=closed.filter(function(p){return p.status==="POGODAK";});
  var realAcc=hits.length/closed.length*100;
  var cap=Math.round((realAcc+12)/5)*5;
  return Math.max(40,Math.min(88,cap));
}

// ── KALIBRACIJA PO TOKENU ────────────────────────────────────────
function getTokenAccuracy(sym,tPct){
  var pct=tPct||settings.targetPct;
  // Prvo traži podatke za ovaj specifičan target
  var tokenPreds=predTracker.filter(function(p){return p.sym===sym&&p.status!=="AKTIVAN"&&(p.targetPct||5)===pct;});
  // Fallback na sve podatke za token ako nema dovoljno
  if(tokenPreds.length<5){
    tokenPreds=predTracker.filter(function(p){return p.sym===sym&&p.status!=="AKTIVAN";});
    if(tokenPreds.length<5)return null;
  }
  var hits=tokenPreds.filter(function(p){return p.status==="POGODAK";});
  return hits.length/tokenPreds.length;
}

    var u=Object.assign({},p);

    // Bilježi dan koji je dostignut (jednom true — ostaje true)
    if(!u.d1Hit&&cur>=(u.d1Target||u.target)){u.d1Hit=true;changed=true;}
    if(!u.d2Hit&&cur>=(u.d2Target||u.target)){u.d2Hit=true;changed=true;}
    if(!u.d3Hit&&cur>=u.target){u.d3Hit=true;changed=true;}

    // Auto-zatvaranje
    var pct=+((cur-p.entry)/p.entry*100).toFixed(2);
    var reason=null;var hit=false;
    if(cur<=p.stop){reason="🛑 Stop-loss hit";hit=false;}
    else if(u.d3Hit){reason="🎯 Target D3 dostignut";hit=true;}
    else if(elapsed>=3*DAY){
      reason="⏰ 3 dana istekla";
      hit=u.d3Hit;
    }
    if(reason){
      changed=true;
      return Object.assign({},u,{status:hit?"POGODAK":"PROMAŠAJ",closePrice:cur,closePct:pct,autoClose:true,closeReason:reason});
    }
    return u;
  });
  if(changed){
    try{localStorage.setItem("ad3d_track",JSON.stringify(predTracker));}catch(e){}
    refreshWeights(); // rekalibracija težina kad se zatvori predikcija
  }
  return changed;
}

// ── AUTO-TRACK PREDIKCIJA (Ulaz + Watch) ─────────────────────────
// source: "ulaz" (✅ signali) ili "watch" (🟡🔵 signali)
function autoTrackOpps(opps, source){
  var now=Date.now();
  var added=false;
  opps.forEach(function(o){
    if(!o||!o.sym||!o.price)return;
    // Preskoči ako već ima AKTIVAN tracking za ovaj token (bilo koji source)
    var alreadyActive=predTracker.some(function(p){return p.sym===o.sym&&p.status==="AKTIVAN";});
    if(alreadyActive)return;
    // Preskoči ako je token bio trackiran u zadnjih 12h
    var recentlyClosed=predTracker.some(function(p){
      return p.sym===o.sym&&p.status!=="AKTIVAN"&&(now-(p.timestamp||parseInt(p.id||"0")))<12*3600*1000;
    });
    if(recentlyClosed)return;
    var isMeme=MEME_SYMS.indexOf(o.sym)>-1;
    var p={
      id:now+"_"+o.sym,
      timestamp:now,
      sym:o.sym,
      type:isMeme?"meme":"regular",
      date:new Date().toLocaleDateString("hr-HR",{day:"numeric",month:"short"}),
      entry:o.price,
      target:o.targetPrice||o.d3Price||o.price,
      d1Target:o.d1Price||o.targetPrice||o.price,
      d2Target:o.d2Price||o.targetPrice||o.price,
      d3Target:o.targetPrice||o.price,
      stop:o.stopPrice||o.price,
      conf:o.conf,
      score:o.score,
      targetPct:o.targetPct||settings.targetPct,
      status:"AKTIVAN",
      closePrice:null,closePct:null,
      autoClose:false,
      autoTrack:true,
      autoSource:source||"ulaz",
      snap:buildSnap(o.sym),
      d1Hit:false,d2Hit:false,d3Hit:false
    };
    predTracker.unshift(p);
    added=true;
  });
  if(added){
    if(predTracker.length>100)predTracker=predTracker.slice(0,100);
    try{localStorage.setItem("ad3d_track",JSON.stringify(predTracker));}catch(e){}
  }
}

// ── 3% ANALYSIS ENGINE ───────────────────────────────────────────
function analyze3pct(sym){
  var d=px[sym]||{},t=ta[sym],m=macd[sym],a=atr[sym],f=fr[sym];
  var price=d.p||0;
  if(!price)return null;

  var score=0,signals=[],warnings=[];
  var TARGET=3,RISK=2; // 3% target, 2% stop

  // F&G kontrarian
  if(MACRO.fg<20){score+=wt("fgExtremeFear",2.5);signals.push({txt:"F&G "+MACRO.fg+" — Extreme Fear = statistički dobar ulaz",type:"bull"});}
  else if(MACRO.fg<35){score+=wt("fgFear",1.5);}
  if(MACRO.stableDom>7){score+=1;signals.push({txt:"Stablecoin dom "+MACRO.stableDom+"% — likvidnost čeka",type:"bull"});}

  // RSI + EMA50 trend filter
  if(t){
    if(t.trend==="DOWN"){score-=2;warnings.push({txt:"Ispod EMA50 — bear trend aktivan",type:"bear"});}
    else if(t.trend==="UP"){score+=wt("trendUp",1);signals.push({txt:"Iznad EMA50 — trend potvrđen",type:"bull"});}
    if(t.rsi<28){score+=wt("rsiOversold",3.5);signals.push({txt:"RSI "+t.rsi.toFixed(0)+" — jako oversold",type:"bull"});}
    else if(t.rsi<38){score+=wt("rsiOversold",2);signals.push({txt:"RSI "+t.rsi.toFixed(0)+" — oversold",type:"bull"});}
    else if(t.rsi>72){score-=2.5;warnings.push({txt:"RSI "+t.rsi.toFixed(0)+" — overbought",type:"bear"});}
    if(t.bb&&price<t.bb.l){score+=wt("bbBelow",2);signals.push({txt:"Ispod Bollinger dna",type:"bull"});}
    else if(t.bb&&price>t.bb.u){score-=1.5;warnings.push({txt:"Iznad Bollinger vrha",type:"bear"});}
    if(t.divergence==="BULLISH"){score+=wt("divBullish",2.5);signals.push({txt:"Bullish RSI divergencija — reversal signal",type:"bull"});}
    else if(t.divergence==="BEARISH"){score-=2;warnings.push({txt:"Bearish RSI divergencija — slabi momentum",type:"bear"});}
  } else {
    if(MACRO.fg<20)score+=1.5;
    signals.push({txt:"TA dostupan na Netlify",type:"warn"});
  }

  // MACD
  if(m){
    if(m.cross==="BULLISH"){score+=wt("macdBullCross",3);signals.push({txt:"MACD bullish cross",type:"bull"});}
    else if(m.cross==="BEARISH"){score-=2;warnings.push({txt:"MACD bearish",type:"bear"});}
    else if(m.bullish){score+=1;}else{score-=0.5;}
  }

  // Funding rate
  if(f&&f.rate!=null){
    var fr2=f.rate*100;
    if(fr2<-0.03){score+=3;signals.push({txt:"FR "+fr2.toFixed(3)+"% — shorts preplati = BUY",type:"bull"});}
    else if(fr2<-0.01){score+=1.5;signals.push({txt:"FR negativan",type:"bull"});}
    else if(fr2>0.03){score-=2;warnings.push({txt:"FR — longs preplati",type:"bear"});}
  }

  // Options
  var opt=optionsData[sym];
  if(opt&&opt.putCallRatio){
    if(opt.putCallRatio>1.3){score+=2;signals.push({txt:"P/C "+opt.putCallRatio+" — kontrarian BUY",type:"bull"});}
    else if(opt.putCallRatio>1.0){score+=1;}
    else if(opt.putCallRatio<0.65){score-=1.5;warnings.push({txt:"P/C "+opt.putCallRatio+" — oprez",type:"bear"});}
  }
  if(opt&&opt.skew25d!=null){
    if(opt.skew25d<-15){score+=2.5;signals.push({txt:"25Δ Skew "+opt.skew25d.toFixed(1)+"% — Extreme put premium = kontrarian BUY",type:"bull"});}
    else if(opt.skew25d<-7){score+=1.5;signals.push({txt:"25Δ Skew "+opt.skew25d.toFixed(1)+"% — put skew = tržište štiti pad",type:"bull"});}
    else if(opt.skew25d>8){score-=1.5;warnings.push({txt:"25Δ Skew +"+opt.skew25d.toFixed(1)+"% — call skew = euforia",type:"bear"});}
  }
  if(opt&&opt.maxPain&&price){
    var mpD=((opt.maxPain-price)/price*100);
    if(mpD>3&&mpD<20){score+=1.5;signals.push({txt:"Max Pain "+fp(opt.maxPain)+" — gravitacija gore",type:"bull"});}
    else if(mpD<-3&&mpD>-20){score-=1;warnings.push({txt:"Max Pain ispod — gravitacija dolje",type:"warn"});}
  }

  // Volume profile
  var vp=volProfile[sym];
  if(vp&&price){
    if(price<vp.valueAreaLow){score+=2.5;signals.push({txt:"Ispod Value Area — mean reversion",type:"bull"});}
    else if(price>vp.valueAreaHigh){score-=1;}
    else{score+=0.5;signals.push({txt:"Unutar VA, POC: "+fp(vp.poc),type:"bull"});}
  }

  // 24h momentum
  if(d.c24!=null){
    if(d.c24<-3&&MACRO.fg<25){score+=2;signals.push({txt:"Pad "+d.c24.toFixed(1)+"% u Extreme Fear = bounce setup",type:"bull"});}
    else if(d.c24<-1.5){score+=0.5;}
    else if(d.c24>2){score+=1;signals.push({txt:"+"+d.c24.toFixed(1)+"% momentum",type:"bull"});}
  }

  // Macro
  var oil=MACRO.oil||0;
  if(oil>110){score-=1.5;warnings.push({txt:"Nafta $"+oil,type:"warn"});}
  else if(oil<90){score+=1;}

  // Token catalysts
  var cats=MACRO.catalysts[sym]||[];
  score+=cats.length*0.4;
  cats.slice(0,2).forEach(function(c2){signals.push({txt:c2,type:"bull"});});
  var warns2=MACRO.warnings[sym]||[];
  score-=warns2.length*0.25;
  warns2.slice(0,1).forEach(function(w){warnings.push({txt:w,type:"warn"});});

  // War penalty — za 3% target
  if(MACRO.warActive){score-=1.0;warnings.push({txt:"Iran rat — smanjen penalty (3% lakše od 5%)",type:"warn"});}
  if(MACRO.oil>110){score-=1;warnings.push({txt:"Nafta $"+MACRO.oil+" — inflacijski pritisak",type:"warn"});}

  // Market regime
  var regime=getMarketRegime();
  if(regime==="MACRO_RISK_OFF"){score-=0.5;warnings.push({txt:"Macro Risk-Off — konzervativno",type:"warn"});}

  // Tržišni signali: BTC dom, BTC trend, volume, order book, 7d trend, DXY
  score+=scoreMarketSignals(sym,signals,warnings);

  // Confidence — rekalibrirani maxScore, war cap snižen s 78% na 55%
  var maxScore=28;
  var rawConf=Math.round(50+(score/maxScore)*42);
  var warCap=score>=4?65:score>=2?58:50;
  var conf=Math.min(MACRO.warActive?warCap:92,Math.max(25,rawConf));
  var calCap=getConfCalibrationCap(3);if(calCap!==null)conf=Math.min(conf,calCap);
  var tokAcc=getTokenAccuracy(sym,3);if(tokAcc!==null)conf=Math.min(conf,Math.max(25,Math.round((tokAcc*100+12)/5)*5));

  // Targets — 3% u 3 dana
  var tgtPct=TARGET/100,riskPct=RISK/100;
  var d1P=+(price*(1+tgtPct*0.40)).toFixed(4);
  var d2P=+(price*(1+tgtPct*0.72)).toFixed(4);
  var d3P=+(price*(1+tgtPct)).toFixed(4);
  var stopP=+(price*(1-riskPct)).toFixed(4);
  var rr=(price*tgtPct)/(price*riskPct);

  // 3% target je lakši → znatno viši faktori nego 5% (0.85/0.72/0.60)
  var baseProb=conf/100;
  var d1Prob=Math.min(97,Math.round(baseProb*1.12*100));
  var d2Prob=Math.min(95,Math.round(baseProb*0.97*100));
  var d3Prob=Math.min(92,Math.round(baseProb*0.83*100));

  var atrPct=a?parseFloat(a.pct):2.0;
  var achievable=atrPct>=(TARGET/3)*0.6; // easier threshold

  var isHot=conf>=60&&score>=2.5&&achievable;
  var isSafe=conf>=55&&atrPct<=4&&rr>=1.3;

  // 3% je lakši cilj od 5% — pragovi su niži nego u analyze3D (58/48/38)
  var verdict="",verdictWhy="";
  if(conf>=52&&score>=2){
    verdict="✅ Ulazi — jak setup";
    verdictWhy="Višestruki signali za +3%. Pouzdanost "+conf+"%."+( MACRO.warActive?" Rat blaži penalty za lakši target.":"");
  } else if(conf>=42&&score>=0){
    verdict="🟡 Ulaz s oprezom";
    verdictWhy="Pozitivan setup za +3%. Čekaj potvrdu — zelena svjećica iznad "+fp(price*1.01)+".";
  } else if(conf>=34&&score>=-1){
    verdict="🔵 Spekulativni ulaz";
    verdictWhy="Slabiji signali. Max 30% normale pozicije. Stop-loss obavezan.";
  } else {
    verdict="🔴 Preskoči";
    verdictWhy="Signali nisu dovoljni. Čekaj bolji setup.";
  }

  return{
    sym:sym,price:price,conf:conf,score:score,
    signals:signals,warnings:warnings,
    d1Price:d1P,d2Price:d2P,d3Price:d3P,
    d1Prob:d1Prob,d2Prob:d2Prob,d3Prob:d3Prob,
    stopPrice:stopP,targetPrice:d3P,
    rr:+rr.toFixed(1),atrPct:atrPct,achievable3d:achievable,
    isHot:isHot,isSafe:isSafe,
    verdict:verdict,verdictWhy:verdictWhy,
    cats:cats,warns:warns2,
    opt:opt||null,vp:vp||null,
    targetPct:TARGET
  };
}

// ── HISTORY CHART ENGINE ─────────────────────────────────────────
function hcCumulative(sorted){
  var W=320,H=128,PL=32,PR=12,PT=12,PB=40;
  var cW=W-PL-PR,cH=H-PT-PB;

  // Zajednička vremenska os po timestamp-u
  var tss=sorted.map(function(p){return p.timestamp||parseInt(p.id||"0");});
  var minTs=Math.min.apply(null,tss),maxTs=Math.max.apply(null,tss);
  var tRange=maxTs-minTs||1;
  function tx(ts){return sorted.length<2?PL+cW/2:PL+((ts-minTs)/tRange)*cW;}
  function ty(pct){return PT+cH-(pct/100*cH);}

  // Kumulativna točnost za podskup (sort po ts već pretpostavljen)
  function buildSeries(preds){
    var pts=[],hits=0;
    preds.forEach(function(p,i){
      if(p.status==="POGODAK")hits++;
      pts.push({ts:p.timestamp||parseInt(p.id||"0"),acc:hits/(i+1)*100,hit:p.status==="POGODAK"});
    });
    return pts;
  }

  var ulazPreds=sorted.filter(function(p){return p.autoTrack&&p.autoSource==="ulaz";});
  var watchPreds=sorted.filter(function(p){return p.autoTrack&&p.autoSource==="watch";});
  var sAll  =buildSeries(sorted);
  var sUlaz =buildSeries(ulazPreds);
  var sWatch=buildSeries(watchPreds);

  var svg='<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="overflow:visible;display:block">';

  // Grid linije
  [25,50,75].forEach(function(pct){
    var y=ty(pct);
    svg+='<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="rgba(255,255,255,.06)" stroke-width="1"/>';
    svg+='<text x="'+(PL-3)+'" y="'+(y+3)+'" font-size="8" fill="rgba(255,255,255,.22)" text-anchor="end">'+pct+'</text>';
  });
  svg+='<line x1="'+PL+'" y1="'+ty(50)+'" x2="'+(W-PR)+'" y2="'+ty(50)+'" stroke="rgba(255,234,0,.18)" stroke-width="1" stroke-dasharray="4 3"/>';

  // Crtanje krivulje
  function drawLine(pts,col,strokeW,dashed,fillOpa){
    if(pts.length<1)return'';
    var d=pts.map(function(pt,i){return(i===0?'M':'L')+tx(pt.ts).toFixed(1)+','+ty(pt.acc).toFixed(1);}).join(' ');
    var out='';
    if(fillOpa>0&&pts.length>1){
      out+='<path d="'+d+' L'+tx(pts[pts.length-1].ts).toFixed(1)+','+(PT+cH)+' L'+tx(pts[0].ts).toFixed(1)+','+(PT+cH)+' Z" fill="'+col+'" fill-opacity="'+fillOpa+'"/>';
    }
    out+='<path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="'+strokeW+'" stroke-linecap="round" stroke-linejoin="round"'+(dashed?' stroke-dasharray="5 3"':'')+'/>';
    return out;
  }

  // 1. Ukupna (siva, isprekidana) — pozadina
  svg+=drawLine(sAll,'rgba(200,200,200,.5)',1.5,true,0.03);
  // 2. Ulaz (plava)
  svg+=drawLine(sUlaz,'#2979ff',2.2,false,0.07);
  // 3. Watch (žuta)
  svg+=drawLine(sWatch,'#ffea00',2.2,false,0.05);

  // Točke za sve predikcije: zelena=pogodak, crvena=promašaj
  sAll.forEach(function(pt){
    svg+='<circle cx="'+tx(pt.ts).toFixed(1)+'" cy="'+ty(pt.acc).toFixed(1)+'" r="2.8" fill="'+(pt.hit?'#00e676':'#ff1744')+'" opacity=".85"/>';
  });

  // Oznaka ukupne točnosti gore desno
  if(sAll.length){
    var la=sAll[sAll.length-1].acc;
    var lc=la>=60?'#00e676':la>=45?'#ffea00':'#ff1744';
    svg+='<text x="'+(W-PR)+'" y="'+(PT+10)+'" font-size="10" font-weight="900" fill="'+lc+'" text-anchor="end">'+la.toFixed(0)+'%</text>';
  }

  // Datumi na x-osi
  var fmt=function(ts){var d=new Date(ts);return d.toLocaleDateString("hr-HR",{day:"numeric",month:"short"});};
  svg+='<text x="'+PL+'" y="'+(PT+cH+13)+'" font-size="8" fill="rgba(255,255,255,.2)" text-anchor="start">'+fmt(minTs)+'</text>';
  svg+='<text x="'+(W-PR)+'" y="'+(PT+cH+13)+'" font-size="8" fill="rgba(255,255,255,.2)" text-anchor="end">'+fmt(maxTs)+'</text>';

  // Legenda s trenutnom točnošću svake krivulje
  var legY=H-7;
  var items=[];
  if(sUlaz.length) items.push({col:'#2979ff', lbl:'⚡ Ulaz '+ sUlaz[sUlaz.length-1].acc.toFixed(0)+'%'});
  if(sWatch.length)items.push({col:'#ffea00', lbl:'👁 Watch '+sWatch[sWatch.length-1].acc.toFixed(0)+'%'});
  if(sAll.length)  items.push({col:'rgba(200,200,200,.7)',lbl:'Ukupno '+sAll[sAll.length-1].acc.toFixed(0)+'%'});
  var legStep=items.length?cW/items.length:cW;
  items.forEach(function(it,i){
    var lx=PL+i*legStep;
    svg+='<line x1="'+lx+'" y1="'+legY+'" x2="'+(lx+14)+'" y2="'+legY+'" stroke="'+it.col+'" stroke-width="2" stroke-linecap="round"/>';
    svg+='<text x="'+(lx+18)+'" y="'+(legY+3)+'" font-size="8.5" fill="'+it.col+'" font-weight="700">'+it.lbl+'</text>';
  });

  svg+='</svg>';
  return svg;
}

function hcConfCalib(sorted){
  var buckets=[{l:"<40",mn:0,mx:40},{l:"40–50",mn:40,mx:50},{l:"50–60",mn:50,mx:60},{l:"60–70",mn:60,mx:70},{l:"70+",mn:70,mx:101}];
  buckets.forEach(function(b){b.ex=[];b.ac=[];});
  sorted.forEach(function(p){buckets.forEach(function(b){if(p.conf>=b.mn&&p.conf<b.mx){b.ex.push(p.conf);b.ac.push(p.status==="POGODAK"?100:0);}});});
  var active=buckets.filter(function(b){return b.ex.length>0;});
  if(active.length<1)return'';
  var h='<div style="margin-bottom:14px"><div style="font-size:10px;color:var(--t3);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">Kalibracija pouzdanosti</div>';
  active.forEach(function(b){
    var ae=b.ex.reduce(function(s,v){return s+v;},0)/b.ex.length;
    var aa=b.ac.reduce(function(s,v){return s+v;},0)/b.ac.length;
    var diff=aa-ae,dc=diff>=0?"#00e676":"#ff1744";
    h+='<div style="margin-bottom:6px">';
    h+='<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px">';
    h+='<span style="color:var(--t3)">'+b.l+'% <span style="color:var(--t4)">('+b.ex.length+'×)</span></span>';
    h+='<span style="color:'+dc+'">'+(diff>=0?'+':'')+diff.toFixed(0)+'% vs procjena</span>';
    h+='</div>';
    h+='<div style="height:18px;background:var(--s3);border-radius:5px;position:relative;overflow:hidden">';
    h+='<div style="position:absolute;left:0;top:0;height:100%;width:'+ae.toFixed(0)+'%;background:rgba(255,255,255,.1);border-radius:5px"></div>';
    h+='<div style="position:absolute;left:0;top:0;height:100%;width:'+aa.toFixed(0)+'%;background:'+(aa>=ae?'rgba(0,230,118,.45)':'rgba(255,23,68,.45)')+';border-radius:5px"></div>';
    h+='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 7px">';

function hcTokenPerf(sorted){

  var tks=Object.keys(map).map(function(s){return{sym:s,h:map[s].h,t:map[s].t,r:map[s].h/map[s].t*100};}).sort(function(a,b){return b.r-a.r||b.t-a.t;});
  if(tks.length<1)return'';
  var h='<div style="margin-bottom:14px"><div style="font-size:10px;color:var(--t3);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">Točnost po tokenu</div>';

    h+='</div>';

function hcInsights(sorted){
  if(sorted.length<3)return'';
  var hits=sorted.filter(function(p){return p.status==="POGODAK";});
  var acc=hits.length/sorted.length*100;
  // Best confidence threshold
  var bestT=null,bestAcc=0,bestN=0;
  [40,45,50,55,60,65,70].forEach(function(t){
    var sub=sorted.filter(function(p){return p.conf>=t;});
    if(sub.length>=2){var a=sub.filter(function(p){return p.status==="POGODAK";}).length/sub.length*100;if(a>bestAcc){bestAcc=a;bestT=t;bestN=sub.length;}}
  });
  // 3% vs 5% target
  var t3=sorted.filter(function(p){return p.targetPct<=3;});
  var t5=sorted.filter(function(p){return p.targetPct>3;});
  var a3=t3.length>0?t3.filter(function(p){return p.status==="POGODAK";}).length/t3.length*100:null;
  var a5=t5.length>0?t5.filter(function(p){return p.status==="POGODAK";}).length/t5.length*100:null;
  // Meme vs regular
  var meme=sorted.filter(function(p){return p.type==="meme";});
  var reg=sorted.filter(function(p){return p.type!=="meme";});
  var am=meme.length>0?meme.filter(function(p){return p.status==="POGODAK";}).length/meme.length*100:null;
  var ar=reg.length>0?reg.filter(function(p){return p.status==="POGODAK";}).length/reg.length*100:null;
  var insights=[];
  if(bestT&&bestAcc>acc+5&&bestN>=2)insights.push({i:"🎯",c:"#00e676",t:"Conf ≥"+bestT+"% daje "+bestAcc.toFixed(0)+"% točnost (vs "+acc.toFixed(0)+"% ukupno). Povećaj min conf prag u Postavkama."});
  if(a3!==null&&a5!==null&&a3>a5+10)insights.push({i:"📊",c:"#ffea00",t:"+3% target ima "+a3.toFixed(0)+"% win rate vs +5% ("+a5.toFixed(0)+"%). Fokusiraj se na 3% za bolji win rate."});
  else if(a3!==null&&a5!==null&&a5>a3+10)insights.push({i:"📊",c:"#ffea00",t:"+5% target performira bolje ("+a5.toFixed(0)+"%) od +3% ("+a3.toFixed(0)+"%). Nastavi s +5% tabom."});
  if(am!==null&&ar!==null){var better=am>ar?"Meme":"Regularni",ba=am>ar?am:ar;if(Math.abs(am-ar)>10)insights.push({i:"💡",c:"#2979ff",t:better+" coinovi performiraju bolje ("+ba.toFixed(0)+"%). Fokusiraj se na taj segment."});}
  if(acc<40)insights.push({i:"⚠️",c:"#ff1744",t:"Win rate ispod 40%. Povećaj min conf na 55%+ i čekaj više potvrda (zelena svjećica) prije ulaza."});
  else if(acc>=60)insights.push({i:"✅",c:"#00e676",t:"Win rate "+acc.toFixed(0)+"% — iznad prosjeka! Nastavi s trenutnom strategijom."});
  if(insights.length===0)return'';
  var h='<div><div style="font-size:10px;color:var(--t3);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">Preporuke za poboljšanje</div>';
  insights.forEach(function(ins){
    h+='<div style="background:rgba(255,255,255,.04);border-radius:10px;padding:9px 11px;margin-bottom:7px;border:.5px solid rgba(255,255,255,.06);display:flex;gap:9px;align-items:flex-start">';
    h+='<span style="font-size:14px;flex-shrink:0;line-height:1.4">'+ins.i+'</span>';
    h+='<span style="font-size:11px;color:'+ins.c+';line-height:1.55">'+ins.t+'</span>';
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function renderHistoryChart(allPreds){
  var closed=allPreds.filter(function(p){return p.status!=="AKTIVAN";});
  if(closed.length<2){
    return'<div style="background:var(--s1);border-radius:16px;padding:20px 16px;margin-bottom:14px;border:.5px solid var(--sep);text-align:center">'

      +'<div style="font-size:14px;font-weight:700;color:var(--t2);margin-bottom:5px">Historijska analiza</div>'

      +'</div>';
  }
  var sorted=closed.slice().sort(function(a,b){return(a.timestamp||parseInt(a.id))-(b.timestamp||parseInt(b.id));});

    var h1=sorted.slice(0,Math.floor(sorted.length/2)).filter(function(p){return p.status==="POGODAK";}).length;
    var h2=sorted.slice(Math.floor(sorted.length/2)).filter(function(p){return p.status==="POGODAK";}).length;
    var n2=sorted.length-Math.floor(sorted.length/2);
    var a1=h1/Math.floor(sorted.length/2)*100,a2=h2/n2*100;
    trend=a2>a1+5?' <span style="color:#00e676;font-size:10px">▲ trend raste</span>':a2<a1-5?' <span style="color:#ff1744;font-size:10px">▼ trend pada</span>':'';
  }
  var h='<div style="background:var(--s1);border-radius:20px;padding:16px;margin-bottom:14px;border:.5px solid var(--sep)">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">';

  h+='<div style="font-size:11px;color:var(--t3);margin-top:2px">'+sorted.length+' zatvorenih · '+hits+' pogodaka</div></div>';
  h+='<div style="text-align:right"><div style="font-size:28px;font-weight:900;letter-spacing:-1px;color:'+accCol+'">'+acc.toFixed(0)+'%</div>';
  h+='<div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em">Win rate</div></div>';
  h+='</div>';
  h+='<div style="margin-bottom:16px"><div style="font-size:10px;color:var(--t3);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px">Kumulativna točnost kroz vrijeme</div>';
  h+=hcCumulative(sorted);
  h+='</div>';
  h+=hcDayMilestones(sorted);
  h+=hcConfCalib(sorted);
  h+=hcTokenPerf(sorted);
  h+=hcInsights(sorted);
  h+='</div>';
  return h;
}

function renderActiveCard(p){
  var cur=px[p.sym]?px[p.sym].p:p.entry;

  h+='<div style="text-align:center;background:var(--s2);border-radius:9px;padding:8px"><div style="font-size:9px;color:rgba(0,230,118,.7);font-weight:700;margin-bottom:2px">TARGET</div><div style="font-size:12px;font-weight:700">'+fp(p.target)+'</div></div>';
  h+='</div>';
  // 3-dnevni targeti
  var DAY=24*3600*1000;

  var days=[

function analyzeMeme(sym){
  var d=px[sym]||{},t=ta[sym],m=macd[sym],a=atr[sym];
  var price=d.p||0;
  if(!price)return null;
  var score=0,signals=[],warnings=[];
  var TARGET=10,RISK=5;
  var atrPct=a?parseFloat(a.pct):0;
  var dailyNeeded=TARGET/3;

  // ATR — kritičan faktor za meme coinove
  if(atrPct>=dailyNeeded*1.5){score+=5;signals.push({txt:"ATR "+atrPct.toFixed(1)+"%/dan — pokriva 10%",type:"bull"});}
  else if(atrPct>=dailyNeeded){score+=3;signals.push({txt:"ATR "+atrPct.toFixed(1)+"%/dan — granično",type:"bull"});}
  else if(atrPct>0){score-=4;warnings.push({txt:"ATR prenizak za 10% target",type:"bear"});}

  // F&G kontrarian
  if(MACRO.fg<20){score+=wt("fgExtremeFear",2);signals.push({txt:"F&G "+MACRO.fg+" — Extreme Fear = bounce šansa",type:"bull"});}
  else if(MACRO.fg<35){score+=wt("fgFear",1);}
  else if(MACRO.fg>65){score-=2;warnings.push({txt:"F&G visok — euphoria, oprez",type:"bear"});}

  // EMA50 trend filter
  if(t){
    if(t.trend==="DOWN"){score-=1.5;warnings.push({txt:"Ispod EMA50 — oprez, trend nije na strani",type:"warn"});}
    else if(t.trend==="UP"){score+=wt("trendUp",1);signals.push({txt:"Iznad EMA50 — trend podržava",type:"bull"});}
  }

  // RSI + divergencija
  if(t){
    if(t.rsi<25){score+=wt("rsiOversold",4);signals.push({txt:"RSI "+t.rsi.toFixed(0)+" — jako oversold",type:"bull"});}
    else if(t.rsi<35){score+=wt("rsiOversold",2.5);signals.push({txt:"RSI "+t.rsi.toFixed(0)+" — oversold",type:"bull"});}
    else if(t.rsi<45){score+=1;}
    else if(t.rsi>72){score-=3;warnings.push({txt:"RSI "+t.rsi.toFixed(0)+" — overbought",type:"bear"});}
    if(t.bb&&price<t.bb.l){score+=wt("bbBelow",2.5);signals.push({txt:"Ispod Bollinger dna — mean reversion",type:"bull"});}
    else if(t.bb&&price>t.bb.u){score-=2;warnings.push({txt:"Iznad Bollinger vrha",type:"bear"});}
    if(t.divergence==="BULLISH"){score+=wt("divBullish",3);signals.push({txt:"Bullish RSI divergencija — reversal signal",type:"bull"});}
    else if(t.divergence==="BEARISH"){score-=2;warnings.push({txt:"Bearish RSI divergencija",type:"bear"});}
  }else{score+=0.5;}

  // MACD
  if(m){
    if(m.cross==="BULLISH"){score+=wt("macdBullCross",3.5);signals.push({txt:"MACD bullish crossover — momentum se okreće",type:"bull"});}
    else if(m.cross==="BEARISH"){score-=2.5;warnings.push({txt:"MACD bearish",type:"bear"});}
    else if(m.bullish){score+=1;}else{score-=0.5;}
  }

  // 24h momentum
  if(d.c24!=null){
    if(d.c24<-15&&MACRO.fg<30){score+=3;signals.push({txt:"Pad "+d.c24.toFixed(1)+"% u strahovlju — bounce setup",type:"bull"});}
    else if(d.c24<-8){score+=1.5;signals.push({txt:"Pad "+d.c24.toFixed(1)+"% — oversold bounce",type:"bull"});}
    else if(d.c24>15){score+=1.5;signals.push({txt:"+"+d.c24.toFixed(1)+"% — jak momentum",type:"bull"});}
    else if(d.c24<-25){score-=1;warnings.push({txt:"Jak pad — provjeri razlog",type:"warn"});}
  }

  // Volume profile
  var vp=volProfile[sym];
  if(vp&&price){
    if(price<vp.valueAreaLow){score+=2;signals.push({txt:"Ispod Value Area — bounce potencijal",type:"bull"});}
    else if(price>vp.valueAreaHigh){score-=1.5;warnings.push({txt:"Iznad Value Area — oprez",type:"warn"});}
  }

  // War + macro penalty
  if(MACRO.warActive){score-=1;warnings.push({txt:"Ratni rizik — meme sentiment nestabilan",type:"warn"});}
  if(MACRO.oil>110){score-=0.5;warnings.push({txt:"Nafta $"+MACRO.oil+" — macro pritisak",type:"warn"});}

  // BTC regime — meme coinovi jako pate kad BTC dominira
  var regime=getMarketRegime();
  if(regime==="MACRO_RISK_OFF"){score-=1;warnings.push({txt:"Macro Risk-Off — meme coinovi najriskantiji",type:"bear"});}

  // Tržišni signali: BTC dom, volume, order book, 7d trend, DXY
  score+=scoreMarketSignals(sym,signals,warnings);

  // Confidence — war cap dodan (bio: bez cap-a = precijenjeni signali u ratu)
  var maxScore=30;
  var rawConf=Math.round(50+(score/maxScore)*50);
  var warCap=score>=5?65:score>=3?58:50;
  var conf=Math.min(MACRO.warActive?warCap:93,Math.max(18,rawConf));
  var calCap=getConfCalibrationCap(10);if(calCap!==null)conf=Math.min(conf,calCap);
  var tokAcc=getTokenAccuracy(sym,10);if(tokAcc!==null)conf=Math.min(conf,Math.max(20,Math.round((tokAcc*100+12)/5)*5));

  // Targets
  var tgt=TARGET/100,risk=RISK/100;
  var d1P=+(price*(1+tgt*0.35)).toFixed(8);
  var d2P=+(price*(1+tgt*0.70)).toFixed(8);
  var d3P=+(price*(1+tgt)).toFixed(8);
  var stopP=+(price*(1-risk)).toFixed(8);
  var rr=(price*tgt)/(price*risk);

  // Meme 10% target — još teži od regularnog 10% (volatilnost ide na obje strane)
  var baseProb=conf/100;
  var d1Prob=Math.round(baseProb*0.58*100);
  var d2Prob=Math.round(baseProb*0.47*100);
  var d3Prob=Math.round(baseProb*0.37*100);

  var achievable=atrPct>=(dailyNeeded*0.7);
  var riskCol=atrPct>10?"var(--pu)":atrPct>5?"var(--re)":atrPct>2?"var(--ye)":"var(--gr)";
  var riskLevel=atrPct>10?"EKSTREMNI":atrPct>5?"VISOK":atrPct>2?"UMJEREN":"NIZAK";

  var verdict="",verdictWhy="";
  if(conf>=65&&achievable){
    verdict="🚀 Jak meme setup";
    verdictWhy="Tehnički signali potvrđuju bounce potencijal."+(MACRO.warActive?" ⚠️ Rat aktivan — max 20% pozicije.":" ATR pokriva 10% u 3 dana. Max 30% pozicije.");
  }else if(conf>=50&&achievable){
    verdict="🟡 Prati — ulaz na potvrdu";
    verdictWhy="Setup postoji, čekaj zelenu svjećicu iznad "+fp(price*1.015)+"."+(MACRO.warActive?" ⚠️ Rat aktivan — max 15% pozicije.":"");
  }else if(conf>=38&&achievable){
    verdict="🔵 Spekulativni meme ulaz";
    verdictWhy="Slabiji signali. Max 10% pozicije. Stop-loss -5% obavezan.";
  }else{
    verdict="🔴 Preskoči";
    verdictWhy="Signali nisu dovoljni za 10% target."+(MACRO.warActive?" Rat dodatno smanjuje šanse.":"");
  }

  return{sym:sym,price:price,conf:conf,score:score,
    signals:signals,warnings:warnings,
    d1Price:d1P,d2Price:d2P,d3Price:d3P,
    d1Prob:d1Prob,d2Prob:d2Prob,d3Prob:d3Prob,
    stopPrice:stopP,targetPrice:d3P,
    rr:+rr.toFixed(1),riskLevel:riskLevel,riskCol:riskCol,
    atrPct:atrPct,achievable3d:achievable,
    isHot:conf>=80&&achievable,isSafe:false,
    verdict:verdict,verdictWhy:verdictWhy,
    cats:[],warns:[],opt:null,vp:vp||null,targetPct:TARGET};
}
